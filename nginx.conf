# DrFX Quant — Nginx Reference Configuration
# Replace YOUR_DOMAIN with your actual domain
# The install.sh script generates this automatically

server {
    listen 80;
    server_name YOUR_DOMAIN;
    # Must be >= the app's upload HARD_MAX (60MB in routes/upload.js); 64M leaves
    # headroom for multipart overhead so the request reaches Node, which then
    # enforces the real per-type caps and returns JSON errors (never HTML).
    client_max_body_size 64M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
