// Only use window.innerHeight (NOT visualViewport which shrinks with keyboard)
let _lastW=window.innerWidth;
function setVH(){document.documentElement.style.setProperty("--vh",window.innerHeight*.01+"px");}
setVH();
// Telegram-style keyboard handling: when the on-screen keyboard opens the visual
// viewport shrinks; we shrink the fixed app shell (#mw) to it so the input bar
// rides ABOVE the keyboard instead of being hidden behind it — using the NATIVE
// keyboard, exactly like Telegram (no DOM rebuild, no custom keyboard).
function syncAppViewport(){
  const vv=window.visualViewport,mw=$("#mw");if(!mw)return;
  if(window.DQKB&&window.DQKB.on)return;
  if(vv&&window.innerWidth<=768){
    const overlap=window.innerHeight-vv.height;       // keyboard height (ignore small toolbar deltas)
    mw.style.bottom=overlap>120?overlap+"px":"0px";
  }else{mw.style.bottom="0px";}
}
if(window.visualViewport){
  let _vst;
  const onVV=()=>{syncAppViewport();const ae=document.activeElement;if(ae&&(ae.tagName==="TEXTAREA"||ae.tagName==="INPUT")){const mc=$("#cv-msgs");if(mc)scrollB(mc);}};
  window.visualViewport.addEventListener("resize",onVV);
  window.visualViewport.addEventListener("scroll",()=>{clearTimeout(_vst);_vst=setTimeout(syncAppViewport,40);});
}
window.addEventListener("orientationchange",()=>setTimeout(()=>{setVH();syncAppViewport();},300));

  const fs=`background:rgba(15,22,45,.7);border:1px solid rgba(100,150,255,.15);color:#e0e8ff;font-family:'Outfit',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;-moz-appearance:none;appearance:none;touch-action:auto`;

  <div style="width:420px;max-width:100%;animation:si .4s ease">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:80px;height:80px;border-radius:22px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(20,30,65,.9),rgba(15,22,50,.95));border:1px solid rgba(100,150,255,.2);box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px rgba(255,255,255,.05);font-size:36px">✉️</div>
      <h1 style="color:#e0e8ff;font-size:24px;font-weight:700;margin:0;letter-spacing:-.3px">Check your email</h1>
      <p style="color:#8090b5;font-size:13px;margin:8px 0 0;line-height:1.6">We sent a 6-digit code to<br><span style="color:#8cc4ff;font-weight:600">${esc(email)}</span></p>
    </div>
    <div style="background:rgba(12,18,42,.8);backdrop-filter:blur(30px);border:1px solid rgba(100,150,255,.12);border-radius:24px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div id="otp-err"></div>
      <div style="color:#a0b4d8;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">CONFIRMATION CODE</div>
      <input id="otp-code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="------" style="width:100%;padding:14px 16px;border-radius:12px;${fs};text-align:center;letter-spacing:14px;font-size:28px;font-weight:700;margin-bottom:20px"/>
      <button id="otp-go" type="button" style="width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#3a6cdc,#2a5cc0);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:'Outfit',sans-serif;box-shadow:0 4px 20px rgba(58,108,220,.4);letter-spacing:.3px;-webkit-appearance:none">Verify &amp; Continue</button>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:18px">
        <button id="otp-back" type="button" style="background:none;border:none;color:#607090;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif">&larr; Back</button>
        <button id="otp-resend" type="button" style="background:none;border:none;color:#8cc4ff;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif">Resend code</button>
      </div>
    </div>
    <p style="color:#506080;font-size:12px;text-align:center;margin-top:18px;line-height:1.6">The code expires in 10 minutes.<br>Check your spam folder if you don't see it.</p>
  </div></div>`;
  const errEl=$("#otp-err"),codeEl=$("#otp-code");
  const note=(bg,bd,col,m)=>`<div style="padding:12px 16px;border-radius:12px;background:${bg};border:1px solid ${bd};color:${col};font-size:13px;margin-bottom:16px">${esc(m)}</div>`;
  const showErr=m=>{errEl.innerHTML=note("rgba(255,100,100,.08)","rgba(255,100,100,.15)","#ff6b6b",m);};
  const showOk=m=>{errEl.innerHTML=note("rgba(74,222,128,.1)","rgba(74,222,128,.2)","#4ade80",m);};
  codeEl.oninput=()=>{codeEl.value=codeEl.value.replace(/[^0-9]/g,"").slice(0,6);};
  const doVerify=async()=>{
    const code=(codeEl.value||"").trim();
    if(code.length<6){showErr("Enter the 6-digit code");return;}
    const b=$("#otp-go");b.disabled=true;b.textContent="Verifying...";
    try{const d=await api("/auth/verify",{method:"POST",body:JSON.stringify({email,code})});S.token=d.token;S.user=d.user;localStorage.setItem("dq_t",d.token);localStorage.setItem("dq_u",JSON.stringify(d.user));connectSocket();render();}

  setTimeout(()=>{codeEl&&codeEl.focus();},80);
}

function dateLabel(ts){
  const d=new Date(ts);if(isNaN(d))return"";
  const now=new Date(),today=now.toDateString(),yest=new Date(now.getTime()-86400000).toDateString(),dd=d.toDateString();
  if(dd===today)return"Today";
  if(dd===yest)return"Yesterday";
  return d.toLocaleDateString([],{day:"numeric",month:"long",year:d.getFullYear()!==now.getFullYear()?"numeric":undefined});
}
function dateSep(ts){

function msgsHTML(list){
  let out="",last="";
  (list||[]).forEach(m=>{
    const d=new Date(m.created_at),day=isNaN(d)?"":d.toDateString();
    if(day&&day!==last){last=day;out+=dateSep(m.created_at);}

  });
  return out;
}

function fmtDur(s){s=Math.max(0,Math.round(s||0));return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
function fmtSize(b){b=b||0;if(b<1024)return b+" B";if(b<1048576)return (b/1024).toFixed(0)+" KB";return (b/1048576).toFixed(1)+" MB";}
function attIcon(a){const m=((a&&a.mime)||"")+" "+((a&&a.name)||"");if(/pdf/i.test(m))return"📕";if(/zip|rar|7z/i.test(m))return"🗜️";if(/word|\.docx?/i.test(m))return"📘";if(/sheet|excel|\.xlsx?|csv/i.test(m))return"📊";if(/presentation|powerpoint|\.pptx?/i.test(m))return"📙";if(/audio/i.test(m))return"🎵";if(/video/i.test(m))return"🎬";if(/text|\.txt/i.test(m))return"📄";return"📎";}
function attPreviewText(a){if(!a)return"";if(a.kind==="voice")return"🎤 Voice message";if(a.kind==="audio")return"🎵 "+(a.name||"Audio");if(a.kind==="video")return"🎬 Video";if(a.kind==="image")return"📷 Photo";return"📎 "+(a.name||"File");}
function renderAttachment(a,mine,lc){
  if(!a||!a.url)return"";
  const url=esc(a.url),name=esc(a.name||"file");
  if(a.kind==="voice"||a.kind==="audio"){
    const isVoice=a.kind==="voice";
    const nameLine=(!isVoice&&a.name)?`<div style="font-size:12px;color:${lc?"#fff":t.t1};font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>`:"";
    return `${nameLine}<div class="vmsg" data-url="${url}" data-dur="${a.dur||0}" style="display:flex;align-items:center;gap:10px;min-width:210px;padding:3px 0"><button type="button" class="vmsg-btn" style="width:38px;height:38px;border-radius:50%;border:none;background:${mine?"rgba(255,255,255,.25)":t.pg};color:#fff;cursor:pointer;flex-shrink:0;font-size:14px;display:flex;align-items:center;justify-content:center">▶</button><div style="flex:1;min-width:90px"><div class="vmsg-bar" style="height:4px;border-radius:2px;background:${mine?"rgba(255,255,255,.3)":t.bl};cursor:pointer;position:relative"><div class="vmsg-fill" style="position:absolute;left:0;top:0;bottom:0;width:0;border-radius:2px;background:${mine?"#fff":t.pr}"></div></div><div class="vmsg-time" style="font-size:10px;color:${mine?"rgba(255,255,255,.7)":t.t3};margin-top:4px">${fmtDur(a.dur||0)}</div></div>${isVoice?'<span style="font-size:15px;flex-shrink:0">🎤</span>':""}</div>`;
  }
  if(a.kind==="video"){
    return `<video src="${url}" controls playsinline preload="metadata" style="width:240px;max-width:100%;max-height:300px;border-radius:10px;display:block;background:#000"></video>`;
  }
  if(a.kind==="image"){
    return `<img src="${url}" class="msg-img" alt="image" style="max-width:100%;max-height:260px;border-radius:10px;cursor:pointer;display:block"/>`;
  }
  return `<a href="${url}" download="${name}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:10px;text-decoration:none;min-width:200px;max-width:260px;padding:4px 2px"><div style="width:42px;height:42px;border-radius:10px;background:${mine?"rgba(255,255,255,.2)":t.ta};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${attIcon(a)}</div><div style="min-width:0"><div style="color:${lc?"#fff":t.t1};font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div><div style="font-size:11px;color:${mine?(lc?"rgba(255,255,255,.7)":t.ac):t.t3}">${a.size?fmtSize(a.size):"Download"}</div></div></a>`;
}
function wireVoice(root){
  if(!root)return;
  root.querySelectorAll(".vmsg:not([data-wired])").forEach(el=>{
    el.dataset.wired="1";
    const url=el.dataset.url,dur=parseFloat(el.dataset.dur)||0;
    const btn=el.querySelector(".vmsg-btn"),fill=el.querySelector(".vmsg-fill"),bar=el.querySelector(".vmsg-bar"),time=el.querySelector(".vmsg-time");
    let audio=null,playing=false;
    const ensure=()=>{
      if(audio)return audio;
      audio=new Audio(url);audio.preload="metadata";
      audio.ontimeupdate=()=>{const d=audio.duration||dur||0;if(d&&fill)fill.style.width=(audio.currentTime/d*100)+"%";if(time)time.textContent=fmtDur(audio.currentTime);};
      audio.onended=()=>{playing=false;if(btn)btn.innerHTML="▶";if(fill)fill.style.width="0%";if(time)time.textContent=fmtDur(dur);audio.currentTime=0;};
      audio.onpause=()=>{playing=false;if(btn)btn.innerHTML="▶";};
      audio.onplay=()=>{playing=true;if(btn)btn.innerHTML="⏸";};
      return audio;
    };
    if(btn)btn.onclick=()=>{const a=ensure();if(playing)a.pause();else a.play().catch(()=>{});};
    if(bar)bar.onclick=e=>{const a=ensure();const r=bar.getBoundingClientRect();const ratio=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));const d=a.duration||dur||0;if(d)a.currentTime=ratio*d;};
  });
}

let _rec=null,_recChunks=[],_recStart=0,_recTimer=null,_recStream=null;
async function startVoiceRecording(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||!window.MediaRecorder){alert("Voice recording isn't supported on this browser.");return;}
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});}
  catch(e){alert("Microphone access is needed to record a voice message.");return;}
  _recStream=stream;_recChunks=[];
  let mime="";
  if(MediaRecorder.isTypeSupported){if(MediaRecorder.isTypeSupported("audio/webm"))mime="audio/webm";else if(MediaRecorder.isTypeSupported("audio/mp4"))mime="audio/mp4";else if(MediaRecorder.isTypeSupported("audio/ogg"))mime="audio/ogg";}
  try{_rec=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);}catch(e){_rec=new MediaRecorder(stream);}
  _rec.ondataavailable=e=>{if(e.data&&e.data.size)_recChunks.push(e.data);};
  _rec.onstop=()=>{const blob=new Blob(_recChunks,{type:(_rec&&_rec.mimeType)||"audio/webm"});const dur=(Date.now()-_recStart)/1000;cleanupRec();if(blob.size>0&&dur>=0.4)finishVoice(blob,dur);else buildInputBar();};
  _recStart=Date.now();
  try{_rec.start();}catch(e){cleanupRec();buildInputBar();return;}
  renderRecordingBar();
}
function cleanupRec(){if(_recTimer){clearInterval(_recTimer);_recTimer=null;}if(_recStream){_recStream.getTracks().forEach(tr=>tr.stop());_recStream=null;}}
function cancelVoiceRecording(){
  if(_rec&&_rec.state!=="inactive"){_recChunks=[];try{_rec.onstop=()=>{cleanupRec();buildInputBar();};_rec.stop();}catch(e){cleanupRec();buildInputBar();}}
  else{cleanupRec();buildInputBar();}
}
function stopVoiceRecording(){if(_rec&&_rec.state!=="inactive"){try{_rec.stop();}catch(e){cleanupRec();buildInputBar();}}else{cleanupRec();buildInputBar();}}
function renderRecordingBar(){
  const bar=$("#cv-bar");if(!bar)return;
  bar.innerHTML="";
  const cancel=ce("button");cancel.type="button";cancel.className="ib";cancel.style.cssText+=";width:40px;height:40px;color:#ef4444";cancel.innerHTML=I.trash;cancel.title="Cancel";cancel.onclick=cancelVoiceRecording;bar.appendChild(cancel);
  const mid=ce("div");mid.style.cssText="flex:1;display:flex;align-items:center;gap:10px;padding:0 6px;min-width:0";
  mid.innerHTML=`<div style="width:10px;height:10px;border-radius:50%;background:#ef4444;animation:bk 1.2s infinite;flex-shrink:0"></div><div id="rec-time" style="color:${t.t1};font-size:14px;font-weight:600">0:00</div><div style="color:${t.t3};font-size:12px">Recording…</div>`;
  bar.appendChild(mid);
  const send=ce("button");send.type="button";send.style.cssText=`width:40px;height:40px;border-radius:50%;border:none;background:${t.pg};color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 12px ${t.pgw}`;send.innerHTML=I.send;send.title="Send";send.onclick=stopVoiceRecording;bar.appendChild(send);
  _recTimer=setInterval(()=>{const el=$("#rec-time");if(!el){clearInterval(_recTimer);_recTimer=null;return;}const s=Math.floor((Date.now()-_recStart)/1000);el.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0");},250);
}
async function finishVoice(blob,dur){
  const bar=$("#cv-bar");
  if(bar)bar.innerHTML=`<div style="flex:1;text-align:center;color:${t.t3};font-size:13px;padding:10px">Sending voice message…</div>`;
  try{
    const fd=new FormData();
    const ext=(blob.type.indexOf("ogg")>=0)?"ogg":((blob.type.indexOf("mp4")>=0||blob.type.indexOf("m4a")>=0)?"m4a":"webm");
    fd.append("file",blob,"voice."+ext);
    const r=await fetch("/api/upload",{method:"POST",headers:{Authorization:"Bearer "+S.token},body:fd});
    const d=await r.json();
    if(d&&d.url){
      const replyId=S.replyTo?.id||null;S.replyTo=null;
      await api(`/chats/${S.activeChat}/messages`,{method:"POST",body:JSON.stringify({attachment:{url:d.url,kind:"voice",mime:d.mime,size:d.size,dur:Math.round(dur)},reply_to:replyId})});
    }else{alert((d&&d.error)||"Could not send voice message");}
  }catch(e){console.error("Voice send:",e);}
  buildInputBar();
}

          dd.onclick=()=>{if(isMem){close();openChat(c.id);}else if(isPub){close();joinOrOpen(c.id);}else{alert("This is a private "+c.type+". An admin must add you.");}};res.appendChild(dd);});}
        if(!d.users?.length&&!d.chats?.length)res.innerHTML=`<div style="padding:12px;text-align:center;color:${t.t3};font-size:13px">No results found</div>`;
      },300);};
      const go=body.querySelector("#nc-go");if(go)go.onclick=async()=>{
        const name=body.querySelector("#nc-name")?.value?.trim();if(!name){alert("Name required");return;}

  ov.innerHTML=`

    <button id="tv-fs" style="width:36px;height:36px;border-radius:10px;border:1px solid ${barBd};background:${btnBg};color:${txtCol};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px" title="Full Screen">⛶</button>

// ━━━ LIVE TRADING — WebRTC SFU client helpers (frame-relay fallback below) ━━━
// Loaded lazily from a CDN only when the server reports SFU mode. Every path is
// wrapped so that if mediasoup-client fails to load or a step errors, the caller
// catches it and the app keeps working on the frame relay.
let _msClient=null;
async function loadMediasoup(){
  if(_msClient)return _msClient;
  const mod=await import("https://esm.sh/mediasoup-client@3");
  _msClient=(mod&&mod.Device)?mod:((mod&&mod.default&&mod.default.Device)?mod.default:mod);
  return _msClient;
}
function sfuReq(socket,event,data){
  return new Promise((resolve,reject)=>{
    let done=false;const to=setTimeout(()=>{if(!done){done=true;reject(new Error(event+" timeout"));}},15000);
    socket.emit(event,data,(res)=>{if(done)return;done=true;clearTimeout(to);if(!res)return reject(new Error(event+": no response"));if(res.error)return reject(new Error(res.error));resolve(res);});
  });
}
async function sfuBroadcast(socket,sessionId,tracks,iceServers){
  const ms=await loadMediasoup();
  const device=new ms.Device();
  const caps=await sfuReq(socket,"live:get-rtp-capabilities",{sessionId});
  await device.load({routerRtpCapabilities:caps.rtpCapabilities});
  const tp=await sfuReq(socket,"live:create-transport",{sessionId,direction:"send"});
  const transport=device.createSendTransport({id:tp.id,iceParameters:tp.iceParameters,iceCandidates:tp.iceCandidates,dtlsParameters:tp.dtlsParameters,iceServers});
  transport.on("connect",({dtlsParameters},cb,errb)=>{sfuReq(socket,"live:connect-transport",{sessionId,transportId:transport.id,dtlsParameters}).then(()=>cb()).catch(errb);});
  transport.on("produce",({kind,rtpParameters},cb,errb)=>{sfuReq(socket,"live:produce",{sessionId,transportId:transport.id,kind,rtpParameters}).then(r=>cb({id:r.id})).catch(errb);});
  // Produce video (with a bitrate cap) plus any audio tracks (mic / system).
  const list=Array.isArray(tracks)?tracks:[tracks];
  const producers=[];
  for(const track of list){
    if(!track)continue;
    const opts={track};
    if(track.kind==="video"){opts.encodings=[{maxBitrate:4000000}];opts.codecOptions={videoGoogleStartBitrate:1000};}
    producers.push(await transport.produce(opts));
  }
  return {device,transport,producers,producer:producers[0]};
}
async function sfuView(socket,sessionId,videoEl,iceServers,onPlaying){
  const ms=await loadMediasoup();
  const device=new ms.Device();
  const caps=await sfuReq(socket,"live:get-rtp-capabilities",{sessionId});
  await device.load({routerRtpCapabilities:caps.rtpCapabilities});
  const tp=await sfuReq(socket,"live:create-transport",{sessionId,direction:"recv"});
  const transport=device.createRecvTransport({id:tp.id,iceParameters:tp.iceParameters,iceCandidates:tp.iceCandidates,dtlsParameters:tp.dtlsParameters,iceServers});
  transport.on("connect",({dtlsParameters},cb,errb)=>{sfuReq(socket,"live:connect-transport",{sessionId,transportId:transport.id,dtlsParameters}).then(()=>cb()).catch(errb);});
  const stream=new MediaStream();
  const consumeOne=async(producerId)=>{
    const data=await sfuReq(socket,"live:consume",{sessionId,producerId,transportId:transport.id,rtpCapabilities:device.rtpCapabilities});
    const consumer=await transport.consume({id:data.id,producerId:data.producerId,kind:data.kind,rtpParameters:data.rtpParameters});
    stream.addTrack(consumer.track);
    videoEl.srcObject=stream;
    await sfuReq(socket,"live:resume",{sessionId,consumerId:consumer.id});
    if(onPlaying)onPlaying();
  };
  const existing=await sfuReq(socket,"live:get-producers",{sessionId}).catch(()=>({producers:[]}));
  for(const p of (existing.producers||[])){try{await consumeOne(p.producerId);}catch(e){console.error(e);}}
  const onNew=(d)=>{if(d&&d.producerId)consumeOne(d.producerId).catch(e=>console.error(e));};
  socket.on("live:new-producer",onNew);
  return {device,transport,stream};
}

    const resetStream=()=>{const idle=ov.querySelector("#live-user-idle"),stream=ov.querySelector("#live-user-stream");if(idle)idle.style.display="flex";if(stream)stream.style.display="none";};
    if(liveMode==="sfu"){

      const setName=(n)=>{const un=ov.querySelector("#live-user-name");if(un)un.textContent=n||"Live";};
      // Try to play WITH sound; browsers may block autoplay-with-audio, so fall
      // back to muted playback and let a tap on the video unmute it.
      const playVid=()=>{if(!vid)return;vid.muted=false;vid.play().catch(()=>{vid.muted=true;vid.play().catch(()=>{});});};
      const us=ov.querySelector("#live-user-stream");if(us)us.addEventListener("click",()=>{if(vid&&vid.muted){vid.muted=false;vid.play().catch(()=>{});}});
      const startView=async(sid)=>{
        if(sfuViewHandle||!sid)return;
        try{
          const ice=await api("/live/ice");
          sfuViewHandle=await sfuView(S.socket,sid,vid,ice.iceServers||[],()=>{showStream();playVid();});
          sfuSession=sid;
        }catch(e){console.error("Live view error:",e);}
      };
      if(liveSession){setName(liveSession.host_name);startView(liveSession.id);}
      S.socket.on("live:available",(d)=>{if(d&&d.sessionId&&d.mode==="sfu"){startView(d.sessionId);}});
      S.socket.on("live:ended",()=>{
        if(sfuViewHandle){try{sfuViewHandle.transport&&sfuViewHandle.transport.close();}catch(e){}sfuViewHandle=null;}
        if(vid)vid.srcObject=null;sfuSession=null;
        resetStream();updateStatus({active:false,viewerCount:0});
      });
    }else{
      // ── Frame-relay fallback: update the img src on each frame ──
      S.socket.on("live_frame",(dataUrl)=>{
        const img=ov.querySelector("#live-img");
        if(img)img.src=dataUrl;
        showStream();
      });
      S.socket.on("live_ended",()=>{
        const img=ov.querySelector("#live-img");if(img)img.src="";
        resetStream();
        updateStatus({active:false,viewerCount:0});
      });
      S.socket.emit("live_join");
    }

  // ── FREE USER VIEW — upgrade ad ──
  else{

        </div>

        <p style="color:${txt2};font-size:14px;margin:0 0 12px;line-height:1.65">Watch real-time trading sessions, live chart analysis, and market breakdowns from the DrFX team — streamed live, members only.</p>
        <p style="color:${txt2};font-size:13px;margin:0 0 24px;line-height:1.65">Upgrade to PRO to unlock Live Trading, the VIP Forex and Crypto signal channel, premium indicators and bots, and your AI assistant.</p>
        <button id="live-up" style="padding:15px 44px;border-radius:14px;border:none;background:linear-gradient(135deg,#FFD700,#f59e0b);color:#1a1a2e;font-size:16px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;box-shadow:0 6px 22px rgba(240,185,11,.45)">⭐ Upgrade to PRO</button>
        <div style="color:${txt2};font-size:12px;margin-top:14px">Only &#36;56/month · cancel anytime</div>
      </div>
    </div>`;
    const up=ov.querySelector("#live-up");if(up)up.onclick=()=>{ov.remove();openSub();};
    const bk=ov.querySelector("#live-back");if(bk)bk.onclick=()=>ov.remove();
    return;
  }
  // Status updates. In relay mode the server pushes live_status; in SFU mode the
  // viewer count arrives via live:viewers (for both the host and the viewers).
  S.socket.on("live_status",(st)=>{
    updateStatus(st);
    if(!isAdmin&&st.active){
      const un=ov.querySelector("#live-user-name");if(un)un.textContent=st.adminName||"Admin";
    }
  });
  if(liveMode==="sfu"){
    S.socket.on("live:viewers",(d)=>{if(d&&typeof d.count==="number")vcEl.textContent=d.count;});
  }else{
    S.socket.emit("live_get_status");
  }
  // Back button cleanup
  ov.querySelector("#live-back").onclick=()=>{
    if(isAdmin){
      if(captureInterval){clearInterval(captureInterval);captureInterval=null;}
      if(liveMode==="sfu"){
        if(sfuHandle){try{(sfuHandle.producers||[sfuHandle.producer]).forEach(p=>{if(p)p.close();});}catch(e){}try{sfuHandle.transport&&sfuHandle.transport.close();}catch(e){}sfuHandle=null;}
        if(sfuSession){S.socket.emit("live:close",{sessionId:sfuSession});api("/live/stop",{method:"POST",body:JSON.stringify({sessionId:sfuSession})}).catch(()=>{});sfuSession=null;}
      }else{
        S.socket.emit("live_stop");
      }
      if(localStream){localStream.getTracks().forEach(tr=>tr.stop());localStream=null;}
    }else{
      if(liveMode==="sfu"){
        if(sfuViewHandle){try{sfuViewHandle.transport&&sfuViewHandle.transport.close();}catch(e){}sfuViewHandle=null;}
        if(sfuSession)S.socket.emit("live:leave",{sessionId:sfuSession});
      }else{
        S.socket.emit("live_leave");
      }
    }
    S.socket.off("live_status");S.socket.off("live_frame");S.socket.off("live_ended");S.socket.off("live:available");S.socket.off("live:ended");S.socket.off("live:viewers");S.socket.off("live:new-producer");
    ov.remove();
  };
}

      const acts=ce("div");acts.style.cssText="display:flex;gap:2px;flex-shrink:0";
      const mkB=(l,c,fn)=>{const b=ce("button");b.type="button";b.textContent=l;b.style.cssText=`padding:3px 7px;border-radius:6px;border:1px solid ${t.bd};background:transparent;color:${c};font-size:10px;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap`;b.onclick=()=>fn(b);return b;};
      const swap=()=>{const nw=rowFor(u);d.replaceWith(nw);return nw;};
      acts.appendChild(mkB(u.blocked?"Unblk":"Block",u.blocked?"#4ade80":"#ff6b6b",async(b)=>{const o=b.textContent;b.textContent="…";b.disabled=true;try{await api(`/admin/users/${u.id}/${u.blocked?"unblock":"block"}`,{method:"POST"});u.blocked=!u.blocked;flashEl(swap(),"rgba(74,222,128,.16)");refreshStats();}catch(e){b.textContent=o;b.disabled=false;alert(e.error||"Error");}}));
      acts.appendChild(mkB("+30d","#FFD700",async(b)=>{const o=b.textContent;b.textContent="…";b.disabled=true;try{await api(`/admin/users/${u.id}/subscription`,{method:"POST",body:JSON.stringify({status:"active",days:30})});u.subscription_status="active";u.subscription_expiry=new Date(Date.now()+30*86400000).toISOString();flashEl(swap(),"rgba(240,185,11,.22)");refreshStats();}catch(e){b.textContent=o;b.disabled=false;alert(e.error||"Error");}}));
      if(isProU)acts.appendChild(mkB("-Pro","#f59e0b",async(b)=>{b.textContent="…";b.disabled=true;try{await api(`/admin/users/${u.id}/subscription`,{method:"POST",body:JSON.stringify({status:"free"})});u.subscription_status="free";u.subscription_expiry=null;flashEl(swap(),"rgba(255,107,107,.15)");refreshStats();}catch(e){b.textContent="-Pro";b.disabled=false;alert(e.error||"Error");}}));
      acts.appendChild(mkB("Del","#ef4444",async(b)=>{if(!confirm(`Delete ${u.name||u.email}? This also removes their messages.`))return;b.textContent="…";b.disabled=true;try{await api(`/admin/users/${u.id}`,{method:"DELETE"});d.remove();refreshStats();}catch(e){b.textContent="Del";b.disabled=false;alert(e.error||"Error");}}));
      d.appendChild(acts);return d;
    };
    const renderUsers=(users)=>{ul.innerHTML="";if(!users.length){ul.innerHTML=`<div style="padding:20px;text-align:center;color:${t.t3};font-size:13px">No users found</div>`;return;}users.forEach(u=>ul.appendChild(rowFor(u)));};
    renderUsers(ud.users);
    let st;body.querySelector("#ad-sq").oninput=()=>{clearTimeout(st);st=setTimeout(async()=>{const q=body.querySelector("#ad-sq").value.trim();try{const d=await api("/admin/users?q="+encodeURIComponent(q));renderUsers(d.users);}catch{}},400);};
  }catch(e){body.innerHTML=`<div style="color:#ef4444">${esc(e.error||"Error")}</div>`;}
});}

// ━━━ NOTIFICATIONS — top-of-screen banner + OS notification (sound via playNotif) ━━━
function initNotify(){
  if(!("Notification" in window))return;
  if(Notification.permission!=="default")return;
  const ask=()=>{try{Notification.requestPermission().catch(()=>{});}catch(e){}document.removeEventListener("click",ask);document.removeEventListener("touchstart",ask);};
  document.addEventListener("click",ask,{once:true});
  document.addEventListener("touchstart",ask,{once:true});
}
function osNotify(title,body,chatId){
  try{
    if(!("Notification" in window)||Notification.permission!=="granted")return;
    const n=new Notification(title,{body:body||"New message",icon:"/logo.png",badge:"/logo.png",tag:"dq-"+chatId,renotify:true});
    n.onclick=()=>{try{window.focus();}catch(e){}if(chatId)openChat(chatId);n.close();};
  }catch(e){}
}
function showToast(title,body,onClick){
  let w=$("#toast-wrap");
  if(!w){w=ce("div");w.id="toast-wrap";w.style.cssText=`position:fixed;top:calc(var(--sat) + 10px);left:0;right:0;z-index:9000;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0 12px;pointer-events:none`;document.body.appendChild(w);}
  const card=ce("div");
  card.style.cssText=`pointer-events:auto;width:100%;max-width:440px;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;background:${t.mod};backdrop-filter:blur(20px);border:1px solid ${t.ba};box-shadow:${t.sh};color:${t.t1};cursor:pointer;animation:toastIn .25s ease`;
  card.innerHTML=`<div style="width:36px;height:36px;border-radius:10px;background:${t.ta};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px">💬</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(title)}</div><div style="font-size:12px;color:${t.t3};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(body||"New message")}</div></div>`;
  let to;
  const dismiss=()=>{clearTimeout(to);card.style.animation="toastOut .2s ease forwards";setTimeout(()=>card.remove(),200);};
  card.onclick=()=>{dismiss();if(onClick)onClick();};
  w.appendChild(card);
  to=setTimeout(dismiss,4500);
}

// ━━━ SOCKET ━━━
function connectSocket(){
  if(S.socket)S.socket.disconnect();if(!S.token)return;
  S.socket=io({auth:{token:S.token}});
  S.socket.on("online_users",u=>{S.onlineUsers=u;renderChatListItems();});
  S.socket.on("chat_message",msg=>{
    const ch=S.chats.find(c=>c.id===msg.chat_id);
    if(ch){ch.lastMessage=msg;if(msg.chat_id!==S.activeChat||document.hidden)ch.unread=(ch.unread||0)+1;S.chats=S.chats.filter(c=>c.id!==msg.chat_id);S.chats.unshift(ch);renderChatListItems();}else loadChats();
    if(msg.chat_id===S.activeChat){S.chatMsgs.push(msg);const mc=$("#cv-msgs");if(mc){mc.insertAdjacentHTML("beforeend",msgBubble(msg));scrollB(mc);wireVoice(mc);const newEl=mc.querySelector(`[data-mid="${msg.id}"]`);if(newEl){let timer;newEl.oncontextmenu=e=>{e.preventDefault();showMsgMenu(msg.id);};newEl.ontouchstart=()=>{timer=setTimeout(()=>showMsgMenu(msg.id),500);};newEl.ontouchmove=()=>clearTimeout(timer);newEl.ontouchend=()=>clearTimeout(timer);}}api(`/chats/${msg.chat_id}/read`,{method:"POST"}).catch(()=>{});if(ch)ch.unread=0;renderChatListItems();}
    if(msg.user_id!==S.user.id){
      playNotif();
      const fromName=msg.sender_name||"New message";
      const preview=msg.image?(msg.content?("📷 "+msg.content):"📷 Photo"):(msg.content||"");
      if(document.hidden)osNotify(fromName,preview,msg.chat_id);
      else if(msg.chat_id!==S.activeChat)showToast(fromName,preview,()=>openChat(msg.chat_id));
    }
  });
  S.socket.on("message_edited",msg=>{const idx=S.chatMsgs.findIndex(m=>m.id===msg.id);if(idx>=0){S.chatMsgs[idx]=msg;const mc=$("#cv-msgs");if(mc){mc.innerHTML=msgsHTML(S.chatMsgs);scrollB(mc);bindMsgEvents(mc);wireVoice(mc);}}const pi=(S.pinnedMsgs||[]).findIndex(p=>p.id===msg.id);if(pi>=0){S.pinnedMsgs[pi]={...S.pinnedMsgs[pi],content:msg.content,image:msg.image};updatePinBar();}});
  S.socket.on("message_deleted",({id,chat_id})=>{S.chatMsgs=S.chatMsgs.filter(m=>m.id!==id);if(chat_id===S.activeChat){const mc=$("#cv-msgs");if(mc){const el=mc.querySelector(`[data-mid="${id}"]`);if(el)el.remove();}if((S.pinnedMsgs||[]).some(p=>p.id===id)){S.pinnedMsgs=S.pinnedMsgs.filter(p=>p.id!==id);if(S.pinIndex>=S.pinnedMsgs.length)S.pinIndex=0;updatePinBar();}}});
  S.socket.on("message_pinned",msg=>{
    if(msg.chat_id!==S.activeChat)return;
    const i=S.chatMsgs.findIndex(m=>m.id===msg.id);if(i>=0)S.chatMsgs[i].pinned=true;
    S.pinnedMsgs=[msg,...(S.pinnedMsgs||[]).filter(p=>p.id!==msg.id)];S.pinIndex=0;updatePinBar();
  });
  S.socket.on("message_unpinned",({id,chat_id})=>{
    if(chat_id!==S.activeChat)return;
    const i=S.chatMsgs.findIndex(m=>m.id===id);if(i>=0)S.chatMsgs[i].pinned=false;
    S.pinnedMsgs=(S.pinnedMsgs||[]).filter(p=>p.id!==id);if(S.pinIndex>=S.pinnedMsgs.length)S.pinIndex=0;updatePinBar();
  });
  S.socket.on("typing",data=>{if(data.chatId===S.activeChat){const el=$("#cv-sub");if(el){el.textContent="typing...";clearTimeout(el._t);el._t=setTimeout(()=>{el.textContent=S.chatInfo?.type==="dm"?"":`${S.chatInfo?.member_count||S.chatInfo?.members?.length||""} members`;},2000);}}});
}

// Resize: ONLY rebuild on WIDTH change. Keyboard open/close only changes HEIGHT.
// This prevents the destroy loop: keyboard→resize→renderApp→DOM nuke→keyboard close
let _resizeT;
window.addEventListener("resize",()=>{
  const newW=window.innerWidth;
  if(newW!==_lastW){_lastW=newW;setVH();clearTimeout(_resizeT);_resizeT=setTimeout(()=>{if(S.token&&S.user)renderApp();},300);}});

// ━━━ INIT ━━━
(async()=>{applyCSS();setVH();
  $("#app").innerHTML=`<div style="width:100vw;height:calc(var(--vh,1vh)*100);display:flex;align-items:center;justify-content:center;background:#030812"><div style="text-align:center;animation:pu 1.5s ease infinite"><div style="font-size:44px;margin-bottom:14px">📈</div><div style="color:#607090;font-size:14px;font-family:'Outfit',sans-serif">Loading...</div></div></div>`;
  if(S.token){try{const u=await api("/auth/me");S.user=u;localStorage.setItem("dq_u",JSON.stringify(u));}catch{S.token=null;S.user=null;localStorage.removeItem("dq_t");localStorage.removeItem("dq_u");}}
  render();if(S.token)connectSocket();initNotify();
})();
</script>
