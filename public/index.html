// Telegram-style keyboard handling: when the on-screen keyboard opens the visual
// viewport shrinks; we shrink the fixed app shell (#mw) to it so the input bar
// rides ABOVE the keyboard instead of being hidden behind it — using the NATIVE
// keyboard, exactly like Telegram (no DOM rebuild, no custom keyboard).
function syncAppViewport(){
  const vv=window.visualViewport,mw=$("#mw");if(!mw)return;
  if(window.DQKB&&window.DQKB.on)return;
  if(vv&&window.innerWidth<=768){
    const overlap=window.innerHeight-vv.height;       // keyboard height (ignore small toolbar deltas)
    mw.style.bottom=overlap>120?overlap+"px":"0px";
  }else{mw.style.bottom="0px";}
}
if(window.visualViewport){
  let _vst;
  const onVV=()=>{syncAppViewport();const ae=document.activeElement;if(ae&&(ae.tagName==="TEXTAREA"||ae.tagName==="INPUT")){const mc=$("#cv-msgs");if(mc)scrollB(mc);}};
  window.visualViewport.addEventListener("resize",onVV);
  window.visualViewport.addEventListener("scroll",()=>{clearTimeout(_vst);_vst=setTimeout(syncAppViewport,40);});
}
window.addEventListener("orientationchange",()=>setTimeout(()=>{setVH();syncAppViewport();},300));

      <button id="otp-go" type="button" style="width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#3a6cdc,#2a5cc0);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:'Outfit',sans-serif;box-shadow:0 4px 20px rgba(58,108,220,.4);letter-spacing:.3px;-webkit-appearance:none">Verify &amp; Continue</button>

        <button id="otp-back" type="button" style="background:none;border:none;color:#607090;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif">&larr; Back</button>
        <button id="otp-resend" type="button" style="background:none;border:none;color:#8cc4ff;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif">Resend code</button>

  </div></div>`;
  const errEl=$("#otp-err"),codeEl=$("#otp-code");
  const note=(bg,bd,col,m)=>`<div style="padding:12px 16px;border-radius:12px;background:${bg};border:1px solid ${bd};color:${col};font-size:13px;margin-bottom:16px">${esc(m)}</div>`;
  const showErr=m=>{errEl.innerHTML=note("rgba(255,100,100,.08)","rgba(255,100,100,.15)","#ff6b6b",m);};
  const showOk=m=>{errEl.innerHTML=note("rgba(74,222,128,.1)","rgba(74,222,128,.2)","#4ade80",m);};
  codeEl.oninput=()=>{codeEl.value=codeEl.value.replace(/[^0-9]/g,"").slice(0,6);};
  const doVerify=async()=>{
    const code=(codeEl.value||"").trim();
    if(code.length<6){showErr("Enter the 6-digit code");return;}
    const b=$("#otp-go");b.disabled=true;b.textContent="Verifying...";
    try{const d=await api("/auth/verify",{method:"POST",body:JSON.stringify({email,code})});S.token=d.token;S.user=d.user;localStorage.setItem("dq_t",d.token);localStorage.setItem("dq_u",JSON.stringify(d.user));connectSocket();render();}
    catch(e){showErr(e.error||"Verification failed");b.disabled=false;b.textContent="Verify & Continue";}
  };
  $("#otp-go").onclick=doVerify;
  codeEl.onkeydown=e=>{if(e.key==="Enter")doVerify();};

  setTimeout(()=>{codeEl&&codeEl.focus();},80);
}

async function globalSearch(q){
  try{
    const d=await api("/chats/users/search?q="+encodeURIComponent(q));
    const cl=$("#cl");if(!cl)return;cl.innerHTML="";
    if(d.users?.length){const h=ce("div");h.style.cssText=`padding:6px 16px;color:${t.t3};font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px`;h.textContent="Users";cl.appendChild(h);
      d.users.forEach(u=>{const r=ce("div");r.style.cssText=`display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent`;r.innerHTML=`${avatar(u.avatar||"💬",42)}<div style="flex:1"><div style="color:${t.t1};font-size:14px;font-weight:600">${esc(u.name||u.email)}${proTag(u,8)}</div><div style="color:${t.t3};font-size:12px">${u.username?"@"+esc(u.username)+" · ":""}${esc(u.email)}</div></div>`;
      r.onclick=()=>{$("#cq").value="";createDM(u.id);};r.onmouseenter=()=>r.style.background=t.cdh;r.onmouseleave=()=>r.style.background="transparent";cl.appendChild(r);});}
    if(d.chats?.length){const h=ce("div");h.style.cssText=`padding:6px 16px;color:${t.t3};font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:4px`;h.textContent="Groups & Channels";cl.appendChild(h);
      d.chats.forEach(c=>{const isPub=c.visibility==="public",isMem=S.chats.some(x=>x.id===c.id);
      const r=ce("div");r.style.cssText=`display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent`;
      r.innerHTML=`${avatar(c.avatar||(c.type==="channel"?"📢":"👥"),42)}<div style="flex:1"><div style="color:${t.t1};font-size:14px;font-weight:600">${esc(c.name)}</div><div style="color:${t.t3};font-size:12px">${isPub?"🌐":"🔒"} ${c.type} · ${c.member_count} members${c.username?" · @"+esc(c.username):""}</div></div>${!isMem&&isPub?`<div class="jb" style="padding:5px 12px;border-radius:8px;background:${t.pg};color:#fff;font-size:12px;font-weight:600;flex-shrink:0">Join</div>`:!isMem&&!isPub?`<div style="color:${t.t4};font-size:11px;flex-shrink:0">🔒 Private</div>`:""}`;
      r.onclick=()=>{$("#cq").value="";if(isMem){openChat(c.id);}else if(isPub){joinOrOpen(c.id);}else{alert("This is a private "+c.type+". An admin must add you.");}};r.onmouseenter=()=>r.style.background=t.cdh;r.onmouseleave=()=>r.style.background="transparent";cl.appendChild(r);});}
    if(!d.users?.length&&!d.chats?.length)cl.innerHTML=`<div style="text-align:center;padding:40px;color:${t.t3};font-size:14px">No results</div>`;

// ── Share & Forward (channel posts) ──
async function shareMessage(msg){
  const link=location.origin+"/m/"+msg.id;
  const chan=(S.chatInfo&&S.chatInfo.name)||"DrFX Quant";
  const vip=!!(S.chatInfo&&S.chatInfo.pro_only);
  const text=vip?(chan+" on DrFX Quant"):(((msg.content||"").trim().slice(0,160))||chan);
  try{if(navigator.share){await navigator.share({title:chan,text,url:link});return;}}
  catch(e){if(e&&e.name==="AbortError")return;}
  try{await navigator.clipboard.writeText(link);showToast("Link copied",link);}
  catch{prompt("Copy this link:",link);}
}

async function forwardTo(targetId,msg,close){

function dateLabel(ts){
  const d=new Date(ts);if(isNaN(d))return"";
  const now=new Date(),today=now.toDateString(),yest=new Date(now.getTime()-86400000).toDateString(),dd=d.toDateString();
  if(dd===today)return"Today";
  if(dd===yest)return"Yesterday";
  return d.toLocaleDateString([],{day:"numeric",month:"long",year:d.getFullYear()!==now.getFullYear()?"numeric":undefined});
}
function dateSep(ts){
  const bg=t.n==="light"?"rgba(255,255,255,.82)":"rgba(8,13,30,.62)";
  return `<div style="display:flex;justify-content:center;margin:12px 0 8px"><span style="background:${bg};color:${t.t2};font-size:11px;font-weight:600;padding:4px 12px;border-radius:12px;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);box-shadow:0 1px 5px rgba(0,0,0,.18)">${esc(dateLabel(ts))}</span></div>`;
}
function msgsHTML(list){
  let out="",last="";
  (list||[]).forEach(m=>{
    const d=new Date(m.created_at),day=isNaN(d)?"":d.toDateString();
    if(day&&day!==last){last=day;out+=dateSep(m.created_at);}
    out+=msgBubble(m);
  });
  return out;
}

function canManagePins(){

function showMsgMenu(msgId){

function wireVoice(root){
  if(!root)return;
  root.querySelectorAll(".vmsg:not([data-wired])").forEach(el=>{
    el.dataset.wired="1";
    const url=el.dataset.url,dur=parseFloat(el.dataset.dur)||0;
    const btn=el.querySelector(".vmsg-btn"),fill=el.querySelector(".vmsg-fill"),bar=el.querySelector(".vmsg-bar"),time=el.querySelector(".vmsg-time");
    let audio=null,playing=false;
    const ensure=()=>{
      if(audio)return audio;
      audio=new Audio(url);audio.preload="metadata";
      audio.ontimeupdate=()=>{const d=audio.duration||dur||0;if(d&&fill)fill.style.width=(audio.currentTime/d*100)+"%";if(time)time.textContent=fmtDur(audio.currentTime);};
      audio.onended=()=>{playing=false;if(btn)btn.innerHTML="▶";if(fill)fill.style.width="0%";if(time)time.textContent=fmtDur(dur);audio.currentTime=0;};
      audio.onpause=()=>{playing=false;if(btn)btn.innerHTML="▶";};
      audio.onplay=()=>{playing=true;if(btn)btn.innerHTML="⏸";};
      return audio;
    };
    if(btn)btn.onclick=()=>{const a=ensure();if(playing)a.pause();else a.play().catch(()=>{});};
    if(bar)bar.onclick=e=>{const a=ensure();const r=bar.getBoundingClientRect();const ratio=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));const d=a.duration||dur||0;if(d)a.currentTime=ratio*d;};
  });
}

let _rec=null,_recChunks=[],_recStart=0,_recTimer=null,_recStream=null;
async function startVoiceRecording(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||!window.MediaRecorder){alert("Voice recording isn't supported on this browser.");return;}
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});}
  catch(e){alert("Microphone access is needed to record a voice message.");return;}
  _recStream=stream;_recChunks=[];
  let mime="";
  if(MediaRecorder.isTypeSupported){if(MediaRecorder.isTypeSupported("audio/webm"))mime="audio/webm";else if(MediaRecorder.isTypeSupported("audio/mp4"))mime="audio/mp4";else if(MediaRecorder.isTypeSupported("audio/ogg"))mime="audio/ogg";}
  try{_rec=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);}catch(e){_rec=new MediaRecorder(stream);}
  _rec.ondataavailable=e=>{if(e.data&&e.data.size)_recChunks.push(e.data);};
  _rec.onstop=()=>{const blob=new Blob(_recChunks,{type:(_rec&&_rec.mimeType)||"audio/webm"});const dur=(Date.now()-_recStart)/1000;cleanupRec();if(blob.size>0&&dur>=0.4)finishVoice(blob,dur);else buildInputBar();};
  _recStart=Date.now();
  try{_rec.start();}catch(e){cleanupRec();buildInputBar();return;}
  renderRecordingBar();
}
function cleanupRec(){if(_recTimer){clearInterval(_recTimer);_recTimer=null;}if(_recStream){_recStream.getTracks().forEach(tr=>tr.stop());_recStream=null;}}
function cancelVoiceRecording(){
  if(_rec&&_rec.state!=="inactive"){_recChunks=[];try{_rec.onstop=()=>{cleanupRec();buildInputBar();};_rec.stop();}catch(e){cleanupRec();buildInputBar();}}
  else{cleanupRec();buildInputBar();}
}
function stopVoiceRecording(){if(_rec&&_rec.state!=="inactive"){try{_rec.stop();}catch(e){cleanupRec();buildInputBar();}}else{cleanupRec();buildInputBar();}}
function renderRecordingBar(){

  _recTimer=setInterval(()=>{const el=$("#rec-time");if(!el){clearInterval(_recTimer);_recTimer=null;return;}const s=Math.floor((Date.now()-_recStart)/1000);el.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0");},250);
}

// ━━━ LIVE TRADING — WebRTC SFU client helpers (frame-relay fallback below) ━━━
// Loaded lazily from a CDN only when the server reports SFU mode. Every path is
// wrapped so that if mediasoup-client fails to load or a step errors, the caller
// catches it and the app keeps working on the frame relay.
let _msClient=null;
async function loadMediasoup(){
  if(_msClient)return _msClient;
  const mod=await import("https://esm.sh/mediasoup-client@3");
  _msClient=(mod&&mod.Device)?mod:((mod&&mod.default&&mod.default.Device)?mod.default:mod);
  return _msClient;
}
function sfuReq(socket,event,data){
  return new Promise((resolve,reject)=>{
    let done=false;const to=setTimeout(()=>{if(!done){done=true;reject(new Error(event+" timeout"));}},15000);
    socket.emit(event,data,(res)=>{if(done)return;done=true;clearTimeout(to);if(!res)return reject(new Error(event+": no response"));if(res.error)return reject(new Error(res.error));resolve(res);});
  });
}
async function sfuBroadcast(socket,sessionId,tracks,iceServers){
  const ms=await loadMediasoup();
  const device=new ms.Device();
  const caps=await sfuReq(socket,"live:get-rtp-capabilities",{sessionId});
  await device.load({routerRtpCapabilities:caps.rtpCapabilities});
  const tp=await sfuReq(socket,"live:create-transport",{sessionId,direction:"send"});
  const transport=device.createSendTransport({id:tp.id,iceParameters:tp.iceParameters,iceCandidates:tp.iceCandidates,dtlsParameters:tp.dtlsParameters,iceServers});
  transport.on("connect",({dtlsParameters},cb,errb)=>{sfuReq(socket,"live:connect-transport",{sessionId,transportId:transport.id,dtlsParameters}).then(()=>cb()).catch(errb);});
  transport.on("produce",({kind,rtpParameters},cb,errb)=>{sfuReq(socket,"live:produce",{sessionId,transportId:transport.id,kind,rtpParameters}).then(r=>cb({id:r.id})).catch(errb);});
  // Produce video (with a bitrate cap) plus any audio tracks (mic / system).
  const list=Array.isArray(tracks)?tracks:[tracks];
  const producers=[];
  for(const track of list){
    if(!track)continue;
    const opts={track};
    if(track.kind==="video"){opts.encodings=[{maxBitrate:4000000}];opts.codecOptions={videoGoogleStartBitrate:1000};}
    producers.push(await transport.produce(opts));
  }
  return {device,transport,producers,producer:producers[0]};
}
async function sfuView(socket,sessionId,videoEl,iceServers,onPlaying){
  const ms=await loadMediasoup();
  const device=new ms.Device();
  const caps=await sfuReq(socket,"live:get-rtp-capabilities",{sessionId});
  await device.load({routerRtpCapabilities:caps.rtpCapabilities});
  const tp=await sfuReq(socket,"live:create-transport",{sessionId,direction:"recv"});
  const transport=device.createRecvTransport({id:tp.id,iceParameters:tp.iceParameters,iceCandidates:tp.iceCandidates,dtlsParameters:tp.dtlsParameters,iceServers});
  transport.on("connect",({dtlsParameters},cb,errb)=>{sfuReq(socket,"live:connect-transport",{sessionId,transportId:transport.id,dtlsParameters}).then(()=>cb()).catch(errb);});
  const stream=new MediaStream();
  const consumeOne=async(producerId)=>{
    const data=await sfuReq(socket,"live:consume",{sessionId,producerId,transportId:transport.id,rtpCapabilities:device.rtpCapabilities});
    const consumer=await transport.consume({id:data.id,producerId:data.producerId,kind:data.kind,rtpParameters:data.rtpParameters});
    stream.addTrack(consumer.track);
    videoEl.srcObject=stream;
    await sfuReq(socket,"live:resume",{sessionId,consumerId:consumer.id});
    if(onPlaying)onPlaying();
  };
  const existing=await sfuReq(socket,"live:get-producers",{sessionId}).catch(()=>({producers:[]}));
  for(const p of (existing.producers||[])){try{await consumeOne(p.producerId);}catch(e){console.error(e);}}
  const onNew=(d)=>{if(d&&d.producerId)consumeOne(d.producerId).catch(e=>console.error(e));};
  socket.on("live:new-producer",onNew);
  return {device,transport,stream};
}

          <button id="live-stop-btn" style="padding:12px 32px;border-radius:12px;border:none;background:#ef4444;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif">⏹ End Stream</button>
        </div>
      </div>
    </div>`;
    let timerInterval;
    // In SFU mode offer real frame rates (the relay's 6/10/15 ceiling is gone).
    if(liveMode==="sfu"){const q=ov.querySelector("#live-fps");if(q)q.innerHTML='<option value="30">Smooth (30 FPS)</option><option value="60" selected>Max (60 FPS)</option>';}
    // Canvas for capturing frames (frame-relay fallback only)
    const cvs=ce("canvas");const ctx2d=cvs.getContext("2d");
    ov.querySelector("#live-start-btn").onclick=async()=>{
      try{
        const fpsSel=parseInt(ov.querySelector("#live-fps").value);
        if(liveMode==="sfu"){
          // ── WebRTC SFU: capture 720p at up to 60fps and PRODUCE the track ──
          localStream=await navigator.mediaDevices.getDisplayMedia({video:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:fpsSel||60}},audio:true});
          // Add the host's microphone (best-effort; prompts for mic permission).
          try{const mic=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});mic.getAudioTracks().forEach(tk=>localStream.addTrack(tk));}catch(micErr){console.warn("Microphone unavailable:",micErr&&micErr.message);}
          ov.querySelector("#live-admin-idle").style.display="none";
          ov.querySelector("#live-admin-stream").style.display="flex";
          const previewVid=ov.querySelector("#live-preview");previewVid.srcObject=localStream;
          const track=localStream.getVideoTracks()[0];track.contentHint="motion";
          track.onended=()=>stopStream();
          const fi0=ov.querySelector("#live-fps-info");if(fi0)fi0.textContent="connecting…";
          const startRes=await api("/live/start",{method:"POST"});
          sfuSession=startRes.sessionId;
          const ice=await api("/live/ice");
          sfuHandle=await sfuBroadcast(S.socket,sfuSession,[track,...localStream.getAudioTracks()],ice.iceServers||[]);
          updateStatus({active:true,viewerCount:0});
          const ss=track.getSettings?track.getSettings():{};
          const aud=localStream.getAudioTracks().length?" · 🔊":"";
          if(fi0)fi0.textContent=`${ss.width||"?"}×${ss.height||"?"} · ${Math.round(ss.frameRate||fpsSel||60)}fps · WebRTC${aud}`;
          const startT=Date.now();
          timerInterval=setInterval(()=>{const d=Math.floor((Date.now()-startT)/1000);const m=String(Math.floor(d/60)).padStart(2,"0");const s=String(d%60).padStart(2,"0");const te=ov.querySelector("#live-timer");if(te)te.textContent=m+":"+s;},1000);
          return;
        }
        // ── Frame-relay fallback ──
        localStream=await navigator.mediaDevices.getDisplayMedia({video:{cursor:"always",frameRate:{ideal:15}},audio:false});
        ov.querySelector("#live-admin-idle").style.display="none";
        const streamDiv=ov.querySelector("#live-admin-stream");streamDiv.style.display="flex";
        const previewVid=ov.querySelector("#live-preview");
        previewVid.srcObject=localStream;
        S.socket.emit("live_start");
        localStream.getVideoTracks()[0].onended=()=>stopStream();
        // Timer
        const startT=Date.now();
        timerInterval=setInterval(()=>{const d=Math.floor((Date.now()-startT)/1000);const m=String(Math.floor(d/60)).padStart(2,"0");const s=String(d%60).padStart(2,"0");const te=ov.querySelector("#live-timer");if(te)te.textContent=m+":"+s;},1000);
        // Frame capture loop: draw video to canvas → JPEG → emit via socket
        const fps=fpsSel||10;
        const interval=Math.round(1000/fps);
        let frameCount=0,lastFpsUpdate=Date.now();
        captureInterval=setInterval(()=>{
          if(!localStream||previewVid.videoWidth===0)return;
          // Scale to max 1280px wide for bandwidth
          const scale=Math.min(1,1280/previewVid.videoWidth);
          cvs.width=Math.round(previewVid.videoWidth*scale);
          cvs.height=Math.round(previewVid.videoHeight*scale);
          ctx2d.drawImage(previewVid,0,0,cvs.width,cvs.height);
          const dataUrl=cvs.toDataURL("image/jpeg",0.65);
          S.socket.emit("live_frame",dataUrl);
          frameCount++;
          const now=Date.now();
          if(now-lastFpsUpdate>=2000){
            const fi=ov.querySelector("#live-fps-info");
            if(fi)fi.textContent=`${Math.round(frameCount*1000/(now-lastFpsUpdate))} fps · ${Math.round(dataUrl.length/1024)}KB`;
            frameCount=0;lastFpsUpdate=now;
          }
        },interval);
      }catch(e){console.error("Screen share error:",e);}
    };
    function stopStream(){
      if(captureInterval){clearInterval(captureInterval);captureInterval=null;}
      if(liveMode==="sfu"){
        if(sfuHandle){try{(sfuHandle.producers||[sfuHandle.producer]).forEach(p=>{if(p)p.close();});}catch(e){}try{sfuHandle.transport&&sfuHandle.transport.close();}catch(e){}sfuHandle=null;}
        if(sfuSession){S.socket.emit("live:close",{sessionId:sfuSession});api("/live/stop",{method:"POST",body:JSON.stringify({sessionId:sfuSession})}).catch(()=>{});sfuSession=null;}
      }else{
        S.socket.emit("live_stop");
      }
      if(localStream){localStream.getTracks().forEach(tr=>tr.stop());localStream=null;}
      clearInterval(timerInterval);
      updateStatus({active:false,viewerCount:0});
      ov.querySelector("#live-admin-idle").style.display="block";
      ov.querySelector("#live-admin-stream").style.display="none";
    }
    ov.querySelector("#live-stop-btn").onclick=stopStream;
  }
  // ── USER VIEW ──
  else if(isProUser){
    content.innerHTML=`
    <div id="live-user-idle" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center">
      <div>
        <div style="width:100px;height:100px;border-radius:50%;background:${btnBg};border:2px solid ${barBd};display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
          <span style="font-size:44px">📺</span>
        </div>
        <h2 style="color:${txtCol};font-size:20px;font-weight:700;margin:0 0 8px">No Active Stream</h2>
        <p style="color:${txt2};font-size:14px;margin:0 0 16px;max-width:340px;line-height:1.6">The admin isn't streaming right now. Stay on this page — the stream will appear automatically when it goes live.</p>
        <div style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;background:${btnBg};border:1px solid ${barBd}">
          <div style="width:8px;height:8px;border-radius:50%;background:${txt2};animation:bk 1.2s infinite"></div>
          <span style="color:${txt2};font-size:13px;font-weight:500">Waiting for stream...</span>
        </div>
      </div>
    </div>
    <div id="live-user-stream" style="display:none;position:absolute;inset:0;background:#000;flex-direction:column">
      <div style="flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden">
        <img id="live-img" style="max-width:100%;max-height:100%;object-fit:contain" alt="Live Stream"/>
        <video id="live-video" autoplay playsinline style="max-width:100%;max-height:100%;object-fit:contain;display:none"></video>
        <div style="position:absolute;top:12px;left:12px;display:flex;gap:8px">
          <div style="padding:4px 12px;border-radius:8px;background:rgba(239,68,68,.9);color:#fff;font-size:12px;font-weight:700;animation:bk 1.2s infinite;backdrop-filter:blur(10px)">● LIVE</div>
          <div id="live-user-name" style="padding:4px 12px;border-radius:8px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;backdrop-filter:blur(10px)"></div>
        </div>
      </div>
    </div>`;
    const showStream=()=>{const idle=ov.querySelector("#live-user-idle"),stream=ov.querySelector("#live-user-stream");if(idle)idle.style.display="none";if(stream)stream.style.display="flex";};
    const resetStream=()=>{const idle=ov.querySelector("#live-user-idle"),stream=ov.querySelector("#live-user-stream");if(idle)idle.style.display="flex";if(stream)stream.style.display="none";};
    if(liveMode==="sfu"){
      // ── WebRTC SFU viewer: consume the broadcaster's track into <video> ──
      const vid=ov.querySelector("#live-video"),img0=ov.querySelector("#live-img");
      if(img0)img0.style.display="none";if(vid)vid.style.display="block";
      const setName=(n)=>{const un=ov.querySelector("#live-user-name");if(un)un.textContent=n||"Live";};
      // Try to play WITH sound; browsers may block autoplay-with-audio, so fall
      // back to muted playback and let a tap on the video unmute it.
      const playVid=()=>{if(!vid)return;vid.muted=false;vid.play().catch(()=>{vid.muted=true;vid.play().catch(()=>{});});};
      const us=ov.querySelector("#live-user-stream");if(us)us.addEventListener("click",()=>{if(vid&&vid.muted){vid.muted=false;vid.play().catch(()=>{});}});
      const startView=async(sid)=>{
        if(sfuViewHandle||!sid)return;
        try{
          const ice=await api("/live/ice");
          sfuViewHandle=await sfuView(S.socket,sid,vid,ice.iceServers||[],()=>{showStream();playVid();});
          sfuSession=sid;
        }catch(e){console.error("Live view error:",e);}
      };
      if(liveSession){setName(liveSession.host_name);startView(liveSession.id);}
      S.socket.on("live:available",(d)=>{if(d&&d.sessionId&&d.mode==="sfu"){startView(d.sessionId);}});
      S.socket.on("live:ended",()=>{
        if(sfuViewHandle){try{sfuViewHandle.transport&&sfuViewHandle.transport.close();}catch(e){}sfuViewHandle=null;}
        if(vid)vid.srcObject=null;sfuSession=null;
        resetStream();updateStatus({active:false,viewerCount:0});
      });
    }else{
      // ── Frame-relay fallback: update the img src on each frame ──
      S.socket.on("live_frame",(dataUrl)=>{
        const img=ov.querySelector("#live-img");
        if(img)img.src=dataUrl;
        showStream();
      });
      S.socket.on("live_ended",()=>{
        const img=ov.querySelector("#live-img");if(img)img.src="";
        resetStream();
        updateStatus({active:false,viewerCount:0});
      });
      S.socket.emit("live_join");
    }
  }
  // ── FREE USER VIEW — upgrade ad ──
  else{
    content.innerHTML=`
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto">
      <div style="max-width:400px;margin:auto">
        <div style="width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#f59e0b);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 8px 32px rgba(240,185,11,.35)">
          <span style="font-size:46px">🔒</span>
        </div>
        <h2 style="color:${txtCol};font-size:22px;font-weight:800;margin:0 0 10px">Live Trading is a <span style="color:#FFD700">PRO</span> feature</h2>
        <p style="color:${txt2};font-size:14px;margin:0 0 12px;line-height:1.65">Watch real-time trading sessions, live chart analysis, and market breakdowns from the DrFX team — streamed live, members only.</p>
        <p style="color:${txt2};font-size:13px;margin:0 0 24px;line-height:1.65">Upgrade to PRO to unlock Live Trading, the VIP Forex and Crypto signal channel, premium indicators and bots, and your AI assistant.</p>
        <button id="live-up" style="padding:15px 44px;border-radius:14px;border:none;background:linear-gradient(135deg,#FFD700,#f59e0b);color:#1a1a2e;font-size:16px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;box-shadow:0 6px 22px rgba(240,185,11,.45)">⭐ Upgrade to PRO</button>
        <div style="color:${txt2};font-size:12px;margin-top:14px">Only &#36;56/month · cancel anytime</div>
      </div>
    </div>`;
    const up=ov.querySelector("#live-up");if(up)up.onclick=()=>{ov.remove();openSub();};
    const bk=ov.querySelector("#live-back");if(bk)bk.onclick=()=>ov.remove();
    return;
  }
  // Status updates. In relay mode the server pushes live_status; in SFU mode the
  // viewer count arrives via live:viewers (for both the host and the viewers).
  S.socket.on("live_status",(st)=>{
    updateStatus(st);
    if(!isAdmin&&st.active){
      const un=ov.querySelector("#live-user-name");if(un)un.textContent=st.adminName||"Admin";
    }
  });
  if(liveMode==="sfu"){
    S.socket.on("live:viewers",(d)=>{if(d&&typeof d.count==="number")vcEl.textContent=d.count;});
  }else{
    S.socket.emit("live_get_status");
  }
  // Back button cleanup
  ov.querySelector("#live-back").onclick=()=>{
    if(isAdmin){
      if(captureInterval){clearInterval(captureInterval);captureInterval=null;}
      if(liveMode==="sfu"){
        if(sfuHandle){try{(sfuHandle.producers||[sfuHandle.producer]).forEach(p=>{if(p)p.close();});}catch(e){}try{sfuHandle.transport&&sfuHandle.transport.close();}catch(e){}sfuHandle=null;}
        if(sfuSession){S.socket.emit("live:close",{sessionId:sfuSession});api("/live/stop",{method:"POST",body:JSON.stringify({sessionId:sfuSession})}).catch(()=>{});sfuSession=null;}
      }else{
        S.socket.emit("live_stop");
      }
      if(localStream){localStream.getTracks().forEach(tr=>tr.stop());localStream=null;}
    }else{
      if(liveMode==="sfu"){
        if(sfuViewHandle){try{sfuViewHandle.transport&&sfuViewHandle.transport.close();}catch(e){}sfuViewHandle=null;}
        if(sfuSession)S.socket.emit("live:leave",{sessionId:sfuSession});
      }else{
        S.socket.emit("live_leave");
      }
    }
    S.socket.off("live_status");S.socket.off("live_frame");S.socket.off("live_ended");S.socket.off("live:available");S.socket.off("live:ended");S.socket.off("live:viewers");S.socket.off("live:new-producer");
    ov.remove();
  };
}

  if((el=tg.closest('.mk-foll'))){e.preventDefault();mkToggleFollow(el);return;}
  if((el=tg.closest('.mk-buy'))){e.preventDefault();mkBuy(el);return;}
  if((el=tg.closest('.mk-cmt'))){e.preventDefault();mkOpenPost(el.dataset.pid);return;}
  if((el=tg.closest('.mk-share'))){e.preventDefault();mkSharePost(el.dataset.pid);return;}
  if((el=tg.closest('.mk-editpost'))){e.preventDefault();mkEditPost(el.dataset.pid);return;}
  if((el=tg.closest('.mk-editp'))){e.preventDefault();mkEditProduct(el.dataset.pid);return;}
  if((el=tg.closest('.mk-openp'))){mkOpenProduct(el.dataset.pid);return;}
  if((el=tg.closest('.mk-viewstore'))){mkGoCreator(el.dataset.h);return;}
  if((el=tg.closest('.mk-openc'))){mkGoCreator(el.dataset.h);return;}
  if((el=tg.closest('.mk-ckind'))){MK.ckind=el.dataset.kind;mkCompanies();return;}
  if((el=tg.closest('.mk-chip'))){MK.type=el.dataset.type;mkExplore();return;}
  if((el=tg.closest('.mk-sortbtn'))){MK.sort=el.dataset.sort;mkExplore();return;}
  if((el=tg.closest('.mk-back2'))){MK.handle=null;MK.cur=null;mkRender();return;}
  if((el=tg.closest('.mk-ctab'))){MK.ctab=el.dataset.ctab;document.querySelectorAll('#mk-overlay .mk-ctab').forEach(b=>{const on=b.dataset.ctab===MK.ctab;b.style.borderBottom='2px solid '+(on?t.pr:'transparent');b.style.color=on?t.t1:t.t3;});const cc=document.getElementById('mk-cv-content');if(cc&&MK.cur)cc.innerHTML=mkCreatorContent(MK.cur);return;}

async function mkExplore(){
  const body=document.getElementById('mk-body');if(!body)return;
  const chips=[['','All']].concat(MK_TYPES).map(p=>{const v=p[0],l=p[1],on=MK.type===v;return `<button class="mk-chip" data-type="${v}" style="flex-shrink:0;padding:7px 14px;border-radius:11px;border:1px solid ${on?t.ba:t.bd};background:${on?t.act:'transparent'};color:${on?t.ac:t.t3};font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">${l}</button>`;}).join('');
  const sorts=[['likes','&#128293; Top'],['new','&#128640; New']].map(p=>{const v=p[0],l=p[1],on=MK.sort===v;return `<button class="mk-sortbtn" data-sort="${v}" style="flex-shrink:0;padding:7px 12px;border-radius:11px;border:1px solid ${on?t.ba:t.bd};background:${on?t.act:'transparent'};color:${on?t.ac:t.t3};font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">${l}</button>`;}).join('');
  body.innerHTML=`
    <div style="display:flex;gap:7px;padding:12px 14px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch">${chips}</div>
    <div style="display:flex;gap:7px;padding:0 14px 10px;align-items:center"><div style="flex:1"></div>${sorts}</div>
    <div id="mk-feed" style="padding:0 12px 26px;max-width:640px;margin:0 auto;width:100%;box-sizing:border-box">${mkLoader()}</div>`;
  try{
    const qs=`sort=${MK.sort}&type=${encodeURIComponent(MK.type)}&q=${encodeURIComponent(MK.q||'')}&limit=30`;
    const d=await api(`/market/explore?${qs}`);
    const feed=document.getElementById('mk-feed');if(!feed)return;
    if(!d.posts||!d.posts.length){feed.innerHTML=mkEmpty('Nothing here yet','Be the first to share a chart, idea, or product with the community.');return;}
    feed.innerHTML=d.posts.map(mkPostCard).join('');mkSetupAutoplay();
  }catch(e){const feed=document.getElementById('mk-feed');if(feed)feed.innerHTML=mkEmpty("Couldn't load feed",mkErrMsg(e));}
}

      <div style="color:${t.pr};font-size:13px;margin-top:1px">@${esc(c.username)}${c.founded_year?` &#183; <span style="color:${t.t3}">Est. ${esc(String(c.founded_year))}</span>`:''}</div>

function mkCreatorContent(d){
  if(MK.ctab==='posts'){
    if(!d.posts||!d.posts.length)return mkEmpty('No posts yet','');
    return `<div style="max-width:640px;margin:0 auto">${d.posts.map(mkPostCard).join('')}</div>`;
  }
  if(!d.products||!d.products.length)return mkEmpty('No products yet',d.creator.is_me?'Tap "Add product" to list your first indicator or strategy.':'');
  return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px">${d.products.map(pr=>mkProductCard(pr,d.creator.is_me)).join('')}</div>`;
}

function mkProductCard(pr,mine){
  const cover=pr.cover?`<img src="${esc(pr.cover)}" alt="" style="width:100%;height:100%;object-fit:cover"/>`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,${t.ch},${t.cd})">${mkChartGlyph(40)}</div>`;
  const badge=pr.badge?`<span style="position:absolute;top:8px;left:8px;font-size:9px;font-weight:800;letter-spacing:.5px;color:#fff;background:${t.pg};padding:3px 8px;border-radius:7px;box-shadow:0 2px 8px ${t.pgw}">${esc(String(pr.badge).toUpperCase())}</span>`:'';
  let action;
  if(mine)action=`<button class="mk-editp" data-pid="${pr.id}" style="${mkBuyBtn()}">Edit</button>`;
  else if(pr.bought_by_me)action=`<button disabled style="padding:8px 14px;border-radius:9px;border:1px solid ${t.ba};background:transparent;color:${t.on};font-weight:700;font-size:12.5px;font-family:inherit;flex-shrink:0">Owned</button>`;
  else action=`<button class="mk-buy" data-pid="${pr.id}" style="${mkBuyBtn()}">Get</button>`;

    <div class="mk-openp" data-pid="${pr.id}" style="position:relative;aspect-ratio:16/10;cursor:pointer;background:${t.ch}">${cover}${badge}<span style="position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;letter-spacing:.5px;color:#fff;background:rgba(0,0,0,.5);padding:3px 8px;border-radius:7px;backdrop-filter:blur(4px)">${mkTypeLabel(pr.type).toUpperCase()}</span></div>
    <div style="padding:10px 12px 12px;display:flex;flex-direction:column;flex:1">
      <div class="mk-openp" data-pid="${pr.id}" style="color:${t.t1};font-weight:700;font-size:14px;cursor:pointer;line-height:1.25">${esc(pr.name)}</div>

      <div style="margin-top:8px">${mkStars(pr.rating_avg,true)}<span style="color:${t.t4};font-size:11px;margin-left:6px">${mkNum(pr.sales_count)} sold</span></div>
      <div style="flex:1"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:8px">${mkPriceTag(pr.price_qntm)}${action}</div>

      const btn=body.querySelector('#mkpf-save');btn.disabled=true;btn.textContent='Saving...';
      try{if(ed)await api(`/market/products/${p.id}`,{method:'PUT',body:JSON.stringify(payload)});else await api('/market/products',{method:'POST',body:JSON.stringify(payload)});close();mkToast(ed?'Saved':'Published!');mkRefreshStore();}catch(e){btn.disabled=false;btn.textContent=ed?'Save changes':'Publish';mkToast(mkErrMsg(e));}
    };
  });
}

function mkAccessBlock(d,p){
  const owned=!!(p&&p.bought_by_me)||!!(d&&((d.access&&(d.access.public_url||d.access.invite_url))||d.source));
  const a=(d&&d.access)||{};
  const src=(d&&d.source)||null;
  const link=(url,label,sub)=>`<a href="${esc(url)}" target="_blank" rel="noopener noreferrer" class="mkop-tv" style="display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid ${t.ba};border-radius:12px;background:${t.act};text-decoration:none;margin-bottom:8px"><span style="display:flex;color:${t.ac}">${ic('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>',18)}</span><span style="flex:1;min-width:0"><span style="display:block;color:${t.t1};font-weight:700;font-size:13px">${label}</span><span style="display:block;color:${t.t3};font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sub}</span></span><span style="color:${t.ac};font-weight:700;font-size:12px;flex-shrink:0">Open &#8599;</span></a>`;
  if(owned){
    let inner='';
    if(a.public_url)inner+=link(a.public_url,'Open in TradingView (public)',a.public_url);
    if(a.invite_url)inner+=link(a.invite_url,'TradingView invite-only access',a.invite_url);
    let blocks='';
    if(inner)blocks+=`<div style="margin:6px 0 14px;padding:13px;border:1px solid ${t.ba};border-radius:14px;background:${t.ch}"><div style="display:flex;align-items:center;gap:7px;margin-bottom:10px;color:${t.on};font-weight:800;font-size:12.5px">${ic('<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',15)} Your TradingView access</div>${inner}<div style="color:${t.t4};font-size:11px;margin-top:4px;line-height:1.5">Open the link, then add the indicator to your chart. For invite-only scripts, request access with your TradingView username if prompted.</div></div>`;
    if(src)blocks+=`<div style="margin:6px 0 14px;padding:13px;border:1px solid ${t.ba};border-radius:14px;background:${t.ch}"><div style="display:flex;align-items:center;gap:7px;margin-bottom:10px;color:${t.on};font-weight:800;font-size:12.5px">${ic('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',15)} Source code</div><button type="button" class="mkop-src" data-id="${p.id}" data-name="${esc(src.name||'source')}" style="display:flex;align-items:center;gap:10px;width:100%;padding:11px 13px;border:1px solid ${t.ba};border-radius:12px;background:${t.act};color:${t.ac};font-family:inherit;cursor:pointer;text-align:left">${ic('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',18)}<span style="flex:1;min-width:0"><span style="display:block;color:${t.t1};font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(src.name||'Download source')}</span><span style="display:block;color:${t.t3};font-size:11px">${src.size?mkBytes(src.size):'Download'}</span></span><span style="color:${t.ac};font-weight:700;font-size:12px;flex-shrink:0">Download</span></button></div>`;
    if(!blocks)blocks=`<div style="margin:6px 0 14px;color:${t.t3};font-size:12.5px">The seller hasn't added access details yet.</div>`;
    return blocks;
  }
  if(d&&(d.has_access_link||d.has_source)){
    const what=(d.has_access_link&&d.has_source)?'a TradingView access link and a downloadable source file':(d.has_source?'a downloadable source file':'a TradingView access link');
    return `<div style="margin:6px 0 14px;padding:12px 13px;border:1px dashed ${t.bd};border-radius:14px;background:${t.ch};display:flex;align-items:center;gap:9px"><span style="display:flex;color:${t.t3}">${ic('<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',16)}</span><div style="color:${t.t3};font-size:12.5px;line-height:1.45">This product includes ${what}, unlocked after purchase.</div></div>`;
  }
  return '';
}
function mkLightbox(url){
  if(!url)return;
  const ov=ce('div');
  ov.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(3,6,15,.93);display:flex;align-items:center;justify-content:center;padding:24px;cursor:zoom-out;animation:dqfade .2s ease';
  ov.innerHTML=`<img src="${esc(url)}" alt="" style="max-width:100%;max-height:100%;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.6)"/><button type="button" aria-label="Close" style="position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.14);color:#fff;font-size:22px;cursor:pointer">&times;</button>`;
  ov.onclick=()=>{ov.remove();};
  document.body.appendChild(ov);
}
async function mkSharePost(id){
  const link=location.origin+"/p/"+id;
  try{if(navigator.share){await navigator.share({title:"DrFX Quant",text:"Check out this post on DrFX Quant",url:link});return;}}
  catch(e){if(e&&e.name==="AbortError")return;}
  try{await navigator.clipboard.writeText(link);showToast("Link copied",link);}
  catch(_){prompt("Copy this link:",link);}
}
function mkOpenPost(id){
  modal('Post',(body,close)=>{
    body.innerHTML=mkLoader();

      const p=d.post;
      body.innerHTML=`

function mkPostCardBare(p){

  else if(p.media_type==='video'&&p.media_url)media=`<video src="${esc(p.media_url)}" controls style="width:100%;border-radius:12px;max-height:300px;background:#000;margin-bottom:8px"></video>`;
  return `<div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">${avatar(a.avatar||'\uD83E\uDDD1\u200D\uD83D\uDCBB',38)}<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:4px;color:${t.t1};font-weight:700;font-size:14px">${esc(a.name||a.username||'User')}${a.verified?goldSeal(14):''}</div><div style="color:${t.t3};font-size:11px">@${esc(a.username||'')} &#183; ${fmtTime(p.created_at)}</div></div></div>
    ${p.title?`<div style="color:${t.t1};font-weight:700;font-size:15px;margin-bottom:6px">${esc(p.title)}</div>`:''}

    <div style="display:flex;align-items:center;gap:6px;margin-top:8px;color:#ff4d6d;font-size:13px;font-weight:600">${mkHeart(true)} ${p.like_count||0}</div>

// Web Push (service worker registration + push subscription)
function dqUrlB64ToU8(base64){
  var pad="=".repeat((4-base64.length%4)%4);
  var b64=(base64+pad).replace(/-/g,"+").replace(/_/g,"/");
  var raw=atob(b64),out=new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);
  return out;
}
var dqSWReg=null;
function dqInitPush(){
  if(!("serviceWorker" in navigator)||!("PushManager" in window))return;
  navigator.serviceWorker.register("/sw.js").then(function(reg){
    dqSWReg=reg;
    navigator.serviceWorker.addEventListener("message",function(ev){
      var d=ev.data||{};
      if(d.type==="dq-open-chat"&&d.chatId!=null&&typeof dqGoToChat==="function")dqGoToChat(d.chatId);
    });
    if(("Notification" in window)&&Notification.permission==="granted")dqSubscribePush();
  }).catch(function(){});
}
function dqSubscribePush(){
  if(!dqSWReg||typeof S==="undefined"||!S.token)return;
  fetch("/api/push/vapid-public-key",{headers:{Authorization:"Bearer "+S.token}})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(j){
      if(!j||!j.key)return;
      return dqSWReg.pushManager.getSubscription().then(function(existing){
        if(existing)return existing;
        return dqSWReg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:dqUrlB64ToU8(j.key)});
      });
    })
    .then(function(sub){
      if(!sub)return;
      return fetch("/api/push/subscribe",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+S.token},body:JSON.stringify({subscription:sub})});
    }).catch(function(){});
}
function initNotify(){
  if(!("Notification" in window))return;
  if(Notification.permission!=="default")return;
  const ask=()=>{try{Notification.requestPermission().then(function(p){if(p==="granted"&&typeof dqSubscribePush==="function")dqSubscribePush();}).catch(()=>{});}catch(e){}document.removeEventListener("click",ask);document.removeEventListener("touchstart",ask);};
  document.addEventListener("click",ask,{once:true});
  document.addEventListener("touchstart",ask,{once:true});
}
function dqCloseOverlays(){
  try{
    var keep={app:1,"toast-wrap":1,"dq-toast-gold-style":1};
    var kids=Array.prototype.slice.call(document.body.children);
    for(var i=0;i<kids.length;i++){
      var el=kids[i];
      if(!el||(el.id&&keep[el.id]))continue;
      var cs;try{cs=getComputedStyle(el);}catch(e){continue;}
      if(cs&&cs.position==="fixed"){var z=parseInt(cs.zIndex,10);if(!isNaN(z)&&z>=400&&el.parentNode)el.parentNode.removeChild(el);}
    }
  }catch(e){}
}
function dqGoToChat(id){dqCloseOverlays();if(typeof openChat==="function")openChat(id);}
function osNotify(title,body,chatId){
  try{
    if(!("Notification" in window)||Notification.permission!=="granted")return;
    const n=new Notification(title,{body:body||"New message",icon:"/icon.svg",badge:"/icon.svg",tag:"dq-"+chatId,renotify:true});
    n.onclick=()=>{try{window.focus();}catch(e){}if(chatId)dqGoToChat(chatId);n.close();};
  }catch(e){}
}

function connectSocket(){
  if(S.socket)S.socket.disconnect();if(!S.token)return;
  S.socket=io({auth:{token:S.token}});
  S.socket.on("online_users",u=>{S.onlineUsers=u;renderChatListItems();});
  S.socket.on("chat_message",msg=>{
    const ch=S.chats.find(c=>c.id===msg.chat_id);
    if(ch){ch.lastMessage=msg;if(msg.chat_id!==S.activeChat||document.hidden)ch.unread=(ch.unread||0)+1;S.chats=S.chats.filter(c=>c.id!==msg.chat_id);S.chats.unshift(ch);renderChatListItems();}else loadChats();
    if(msg.chat_id===S.activeChat){S.chatMsgs.push(msg);const mc=$("#cv-msgs");if(mc){mc.insertAdjacentHTML("beforeend",msgBubble(msg));scrollB(mc);wireVoice(mc);if(window.dqTranslate)dqTranslate.onIncoming(mc,msg);if(window.dqHydrateLinkCards)dqHydrateLinkCards(mc);const newEl=mc.querySelector(`[data-mid="${msg.id}"]`);if(newEl){let timer;newEl.oncontextmenu=e=>{e.preventDefault();showMsgMenu(msg.id);};newEl.ontouchstart=()=>{timer=setTimeout(()=>showMsgMenu(msg.id),500);};newEl.ontouchmove=()=>clearTimeout(timer);newEl.ontouchend=()=>clearTimeout(timer);}}api(`/chats/${msg.chat_id}/read`,{method:"POST"}).catch(()=>{});if(ch)ch.unread=0;renderChatListItems();}
    if(msg.user_id!==S.user.id){
      playNotif();
      const fromName=msg.sender_name||"New message";
      const preview=msg.image?(msg.content?("📷 "+msg.content):"📷 Photo"):(msg.content||"");
      if(document.hidden)osNotify(fromName,preview,msg.chat_id);
      else if(msg.chat_id!==S.activeChat)showToast(fromName,preview,()=>dqGoToChat(msg.chat_id));
    }
  });
  S.socket.on("message_edited",msg=>{const idx=S.chatMsgs.findIndex(m=>m.id===msg.id);if(idx>=0){msg.reactions=S.chatMsgs[idx]?.reactions||[];S.chatMsgs[idx]=msg;const mc=$("#cv-msgs");if(mc){mc.innerHTML=msgsHTML(S.chatMsgs);scrollB(mc);bindMsgEvents(mc);wireVoice(mc);}}const pi=(S.pinnedMsgs||[]).findIndex(p=>p.id===msg.id);if(pi>=0){S.pinnedMsgs[pi]={...S.pinnedMsgs[pi],content:msg.content,image:msg.image};updatePinBar();}});
  S.socket.on("message_deleted",({id,chat_id})=>{S.chatMsgs=S.chatMsgs.filter(m=>m.id!==id);if(chat_id===S.activeChat){const mc=$("#cv-msgs");if(mc){const el=mc.querySelector(`[data-mid="${id}"]`);if(el)el.remove();}if((S.pinnedMsgs||[]).some(p=>p.id===id)){S.pinnedMsgs=S.pinnedMsgs.filter(p=>p.id!==id);if(S.pinIndex>=S.pinnedMsgs.length)S.pinIndex=0;updatePinBar();}}});
  S.socket.on("messages_expired",({chat_id,ids})=>{if(!Array.isArray(ids)||!ids.length)return;const set=new Set(ids);if(chat_id===S.activeChat){S.chatMsgs=S.chatMsgs.filter(m=>!set.has(m.id));const mc=$("#cv-msgs");if(mc)ids.forEach(id=>{const el=mc.querySelector(`[data-mid="${id}"]`);if(el)el.remove();});if((S.pinnedMsgs||[]).some(p=>set.has(p.id))){S.pinnedMsgs=S.pinnedMsgs.filter(p=>!set.has(p.id));if(S.pinIndex>=S.pinnedMsgs.length)S.pinIndex=0;updatePinBar();}}loadChats();});
  S.socket.on("chat_cleared",({chat_id})=>{if(chat_id===S.activeChat){S.chatMsgs=[];S.pinnedMsgs=[];const mc=$("#cv-msgs");if(mc)mc.innerHTML="";updatePinBar();renderChatView();}loadChats();});
  S.socket.on("reaction_updated",d=>{if(!d||d.chat_id!==S.activeChat)return;const m=S.chatMsgs.find(x=>x.id===d.message_id);if(!m)return;mergeReactions(m,d.reactions);renderMsgReactions(d.message_id);});
  S.socket.on("message_pinned",msg=>{
    if(msg.chat_id!==S.activeChat)return;
    const i=S.chatMsgs.findIndex(m=>m.id===msg.id);if(i>=0)S.chatMsgs[i].pinned=true;
    S.pinnedMsgs=[msg,...(S.pinnedMsgs||[]).filter(p=>p.id!==msg.id)];S.pinIndex=0;updatePinBar();
  });
  S.socket.on("message_unpinned",({id,chat_id})=>{
    if(chat_id!==S.activeChat)return;
    const i=S.chatMsgs.findIndex(m=>m.id===id);if(i>=0)S.chatMsgs[i].pinned=false;
    S.pinnedMsgs=(S.pinnedMsgs||[]).filter(p=>p.id!==id);if(S.pinIndex>=S.pinnedMsgs.length)S.pinIndex=0;updatePinBar();
  });
  S.socket.on("broadcast",b=>{try{const lv=(b&&b.level)||"info";const ic0=lv==="critical"?"\uD83D\uDED1":lv==="warning"?"\u26A0\uFE0F":"\uD83D\uDCE2";showToast(ic0+" "+((b&&b.title)||"Announcement"),(b&&b.body)||"");if(lv==="critical")playNotif();}catch(e){}});
  S.socket.on("typing",data=>{if(data.chatId===S.activeChat){const el=$("#cv-sub");if(el){el.textContent="typing...";clearTimeout(el._t);el._t=setTimeout(()=>{el.textContent=S.chatInfo?.type==="dm"?dmStatusText():`${S.chatInfo?.member_count||S.chatInfo?.members?.length||""} members`;},2000);}}});
}
