function bindMsgEvents(mc){

// ━━━ LIVE TRADING — WebRTC SFU client helpers (frame-relay fallback below) ━━━
// Loaded lazily from a CDN only when the server reports SFU mode. Every path is
// wrapped so that if mediasoup-client fails to load or a step errors, the caller
// catches it and the app keeps working on the frame relay.
let _msClient=null;
async function loadMediasoup(){
  if(_msClient)return _msClient;
  const mod=await import("https://esm.sh/mediasoup-client@3");
  _msClient=(mod&&mod.Device)?mod:((mod&&mod.default&&mod.default.Device)?mod.default:mod);
  return _msClient;
}
function sfuReq(socket,event,data){
  return new Promise((resolve,reject)=>{
    let done=false;const to=setTimeout(()=>{if(!done){done=true;reject(new Error(event+" timeout"));}},15000);
    socket.emit(event,data,(res)=>{if(done)return;done=true;clearTimeout(to);if(!res)return reject(new Error(event+": no response"));if(res.error)return reject(new Error(res.error));resolve(res);});
  });
}
async function sfuBroadcast(socket,sessionId,track,iceServers){
  const ms=await loadMediasoup();
  const device=new ms.Device();
  const caps=await sfuReq(socket,"live:get-rtp-capabilities",{sessionId});
  await device.load({routerRtpCapabilities:caps.rtpCapabilities});
  const tp=await sfuReq(socket,"live:create-transport",{sessionId,direction:"send"});
  const transport=device.createSendTransport({id:tp.id,iceParameters:tp.iceParameters,iceCandidates:tp.iceCandidates,dtlsParameters:tp.dtlsParameters,iceServers});
  transport.on("connect",({dtlsParameters},cb,errb)=>{sfuReq(socket,"live:connect-transport",{sessionId,transportId:transport.id,dtlsParameters}).then(()=>cb()).catch(errb);});
  transport.on("produce",({kind,rtpParameters},cb,errb)=>{sfuReq(socket,"live:produce",{sessionId,transportId:transport.id,kind,rtpParameters}).then(r=>cb({id:r.id})).catch(errb);});
  const producer=await transport.produce({track,encodings:[{maxBitrate:4000000}],codecOptions:{videoGoogleStartBitrate:1000}});
  return {device,transport,producer};
}
async function sfuView(socket,sessionId,videoEl,iceServers,onPlaying){
  const ms=await loadMediasoup();
  const device=new ms.Device();
  const caps=await sfuReq(socket,"live:get-rtp-capabilities",{sessionId});
  await device.load({routerRtpCapabilities:caps.rtpCapabilities});
  const tp=await sfuReq(socket,"live:create-transport",{sessionId,direction:"recv"});
  const transport=device.createRecvTransport({id:tp.id,iceParameters:tp.iceParameters,iceCandidates:tp.iceCandidates,dtlsParameters:tp.dtlsParameters,iceServers});
  transport.on("connect",({dtlsParameters},cb,errb)=>{sfuReq(socket,"live:connect-transport",{sessionId,transportId:transport.id,dtlsParameters}).then(()=>cb()).catch(errb);});
  const stream=new MediaStream();
  const consumeOne=async(producerId)=>{
    const data=await sfuReq(socket,"live:consume",{sessionId,producerId,transportId:transport.id,rtpCapabilities:device.rtpCapabilities});
    const consumer=await transport.consume({id:data.id,producerId:data.producerId,kind:data.kind,rtpParameters:data.rtpParameters});
    stream.addTrack(consumer.track);
    videoEl.srcObject=stream;
    await sfuReq(socket,"live:resume",{sessionId,consumerId:consumer.id});
    if(onPlaying)onPlaying();
  };
  const existing=await sfuReq(socket,"live:get-producers",{sessionId}).catch(()=>({producers:[]}));
  for(const p of (existing.producers||[])){try{await consumeOne(p.producerId);}catch(e){console.error(e);}}
  const onNew=(d)=>{if(d&&d.producerId)consumeOne(d.producerId).catch(e=>console.error(e));};
  socket.on("live:new-producer",onNew);
  return {device,transport,stream};
}

          const startRes=await api("/live/start",{method:"POST"});
          sfuSession=startRes.sessionId;
          const ice=await api("/live/ice");
          sfuHandle=await sfuBroadcast(S.socket,sfuSession,track,ice.iceServers||[]);
          updateStatus({active:true,viewerCount:0});
          const ss=track.getSettings?track.getSettings():{};
          if(fi0)fi0.textContent=`${ss.width||"?"}×${ss.height||"?"} · ${Math.round(ss.frameRate||fpsSel||60)}fps · WebRTC`;
          const startT=Date.now();
          timerInterval=setInterval(()=>{const d=Math.floor((Date.now()-startT)/1000);const m=String(Math.floor(d/60)).padStart(2,"0");const s=String(d%60).padStart(2,"0");const te=ov.querySelector("#live-timer");if(te)te.textContent=m+":"+s;},1000);
          return;
        }
        // ── Frame-relay fallback ──
        localStream=await navigator.mediaDevices.getDisplayMedia({video:{cursor:"always",frameRate:{ideal:15}},audio:false});
        ov.querySelector("#live-admin-idle").style.display="none";
        const streamDiv=ov.querySelector("#live-admin-stream");streamDiv.style.display="flex";
        const previewVid=ov.querySelector("#live-preview");
        previewVid.srcObject=localStream;
        S.socket.emit("live_start");
        localStream.getVideoTracks()[0].onended=()=>stopStream();
        // Timer
        const startT=Date.now();
        timerInterval=setInterval(()=>{const d=Math.floor((Date.now()-startT)/1000);const m=String(Math.floor(d/60)).padStart(2,"0");const s=String(d%60).padStart(2,"0");const te=ov.querySelector("#live-timer");if(te)te.textContent=m+":"+s;},1000);
        // Frame capture loop: draw video to canvas → JPEG → emit via socket
        const fps=fpsSel||10;
        const interval=Math.round(1000/fps);
        let frameCount=0,lastFpsUpdate=Date.now();
        captureInterval=setInterval(()=>{
          if(!localStream||previewVid.videoWidth===0)return;
          // Scale to max 1280px wide for bandwidth
          const scale=Math.min(1,1280/previewVid.videoWidth);
          cvs.width=Math.round(previewVid.videoWidth*scale);
          cvs.height=Math.round(previewVid.videoHeight*scale);
          ctx2d.drawImage(previewVid,0,0,cvs.width,cvs.height);
          const dataUrl=cvs.toDataURL("image/jpeg",0.65);
          S.socket.emit("live_frame",dataUrl);
          frameCount++;
          const now=Date.now();
          if(now-lastFpsUpdate>=2000){
            const fi=ov.querySelector("#live-fps-info");
            if(fi)fi.textContent=`${Math.round(frameCount*1000/(now-lastFpsUpdate))} fps · ${Math.round(dataUrl.length/1024)}KB`;
            frameCount=0;lastFpsUpdate=now;
          }
        },interval);
      }catch(e){console.error("Screen share error:",e);}
    };
    function stopStream(){
      if(captureInterval){clearInterval(captureInterval);captureInterval=null;}
      if(liveMode==="sfu"){
        if(sfuHandle){try{sfuHandle.producer&&sfuHandle.producer.close();}catch(e){}try{sfuHandle.transport&&sfuHandle.transport.close();}catch(e){}sfuHandle=null;}
        if(sfuSession){S.socket.emit("live:close",{sessionId:sfuSession});api("/live/stop",{method:"POST",body:JSON.stringify({sessionId:sfuSession})}).catch(()=>{});sfuSession=null;}
      }else{
        S.socket.emit("live_stop");
      }
      if(localStream){localStream.getTracks().forEach(tr=>tr.stop());localStream=null;}
      clearInterval(timerInterval);
      updateStatus({active:false,viewerCount:0});
      ov.querySelector("#live-admin-idle").style.display="block";
      ov.querySelector("#live-admin-stream").style.display="none";
    }
    ov.querySelector("#live-stop-btn").onclick=stopStream;
  }
  // ── USER VIEW ──
  else if(isProUser){
    content.innerHTML=`
    <div id="live-user-idle" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center">
      <div>
        <div style="width:100px;height:100px;border-radius:50%;background:${btnBg};border:2px solid ${barBd};display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
          <span style="font-size:44px">📺</span>
        </div>
        <h2 style="color:${txtCol};font-size:20px;font-weight:700;margin:0 0 8px">No Active Stream</h2>
        <p style="color:${txt2};font-size:14px;margin:0 0 16px;max-width:340px;line-height:1.6">The admin isn't streaming right now. Stay on this page — the stream will appear automatically when it goes live.</p>
        <div style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;background:${btnBg};border:1px solid ${barBd}">
          <div style="width:8px;height:8px;border-radius:50%;background:${txt2};animation:bk 1.2s infinite"></div>
          <span style="color:${txt2};font-size:13px;font-weight:500">Waiting for stream...</span>
        </div>
      </div>
    </div>
    <div id="live-user-stream" style="display:none;position:absolute;inset:0;background:#000;flex-direction:column">
      <div style="flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden">
        <img id="live-img" style="max-width:100%;max-height:100%;object-fit:contain" alt="Live Stream"/>
        <video id="live-video" autoplay playsinline style="max-width:100%;max-height:100%;object-fit:contain;display:none"></video>
        <div style="position:absolute;top:12px;left:12px;display:flex;gap:8px">
          <div style="padding:4px 12px;border-radius:8px;background:rgba(239,68,68,.9);color:#fff;font-size:12px;font-weight:700;animation:bk 1.2s infinite;backdrop-filter:blur(10px)">● LIVE</div>
          <div id="live-user-name" style="padding:4px 12px;border-radius:8px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;backdrop-filter:blur(10px)"></div>
        </div>
      </div>
    </div>`;
    const showStream=()=>{const idle=ov.querySelector("#live-user-idle"),stream=ov.querySelector("#live-user-stream");if(idle)idle.style.display="none";if(stream)stream.style.display="flex";};
    const resetStream=()=>{const idle=ov.querySelector("#live-user-idle"),stream=ov.querySelector("#live-user-stream");if(idle)idle.style.display="flex";if(stream)stream.style.display="none";};
    if(liveMode==="sfu"){
      // ── WebRTC SFU viewer: consume the broadcaster's track into <video> ──
      const vid=ov.querySelector("#live-video"),img0=ov.querySelector("#live-img");
      if(img0)img0.style.display="none";if(vid)vid.style.display="block";
      const setName=(n)=>{const un=ov.querySelector("#live-user-name");if(un)un.textContent=n||"Live";};
      const startView=async(sid)=>{
        if(sfuViewHandle||!sid)return;
        try{
          const ice=await api("/live/ice");
          sfuViewHandle=await sfuView(S.socket,sid,vid,ice.iceServers||[],()=>{showStream();if(vid.play)vid.play().catch(()=>{});});
          sfuSession=sid;
        }catch(e){console.error("Live view error:",e);}
      };
      if(liveSession){setName(liveSession.host_name);startView(liveSession.id);}
      S.socket.on("live:available",(d)=>{if(d&&d.sessionId&&d.mode==="sfu"){startView(d.sessionId);}});
      S.socket.on("live:ended",()=>{
        if(sfuViewHandle){try{sfuViewHandle.transport&&sfuViewHandle.transport.close();}catch(e){}sfuViewHandle=null;}
        if(vid)vid.srcObject=null;sfuSession=null;
        resetStream();updateStatus({active:false,viewerCount:0});
      });
    }else{
      // ── Frame-relay fallback: update the img src on each frame ──
      S.socket.on("live_frame",(dataUrl)=>{
        const img=ov.querySelector("#live-img");
        if(img)img.src=dataUrl;
        showStream();
      });
      S.socket.on("live_ended",()=>{
        const img=ov.querySelector("#live-img");if(img)img.src="";
        resetStream();
        updateStatus({active:false,viewerCount:0});
      });
      S.socket.emit("live_join");
    }
  }
  // ── FREE USER VIEW — upgrade ad ──
  else{
    content.innerHTML=`
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto">
      <div style="max-width:400px;margin:auto">
        <div style="width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#f59e0b);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 8px 32px rgba(240,185,11,.35)">
          <span style="font-size:46px">🔒</span>
        </div>
        <h2 style="color:${txtCol};font-size:22px;font-weight:800;margin:0 0 10px">Live Trading is a <span style="color:#FFD700">PRO</span> feature</h2>
        <p style="color:${txt2};font-size:14px;margin:0 0 12px;line-height:1.65">Watch real-time trading sessions, live chart analysis, and market breakdowns from the DrFX team — streamed live, members only.</p>
        <p style="color:${txt2};font-size:13px;margin:0 0 24px;line-height:1.65">Upgrade to PRO to unlock Live Trading, the VIP Forex and Crypto signal channel, premium indicators and bots, and your AI assistant.</p>
        <button id="live-up" style="padding:15px 44px;border-radius:14px;border:none;background:linear-gradient(135deg,#FFD700,#f59e0b);color:#1a1a2e;font-size:16px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;box-shadow:0 6px 22px rgba(240,185,11,.45)">⭐ Upgrade to PRO</button>
        <div style="color:${txt2};font-size:12px;margin-top:14px">Only &#36;56/month · cancel anytime</div>
      </div>
    </div>`;
    const up=ov.querySelector("#live-up");if(up)up.onclick=()=>{ov.remove();openSub();};
    const bk=ov.querySelector("#live-back");if(bk)bk.onclick=()=>ov.remove();
    return;
  }
  // Status updates. In relay mode the server pushes live_status; in SFU mode the
  // viewer count arrives via live:viewers (for both the host and the viewers).
  S.socket.on("live_status",(st)=>{
    updateStatus(st);
    if(!isAdmin&&st.active){
      const un=ov.querySelector("#live-user-name");if(un)un.textContent=st.adminName||"Admin";
    }
  });
  if(liveMode==="sfu"){
    S.socket.on("live:viewers",(d)=>{if(d&&typeof d.count==="number")vcEl.textContent=d.count;});
  }else{
    S.socket.emit("live_get_status");
  }
  // Back button cleanup
  ov.querySelector("#live-back").onclick=()=>{
    if(isAdmin){
      if(captureInterval){clearInterval(captureInterval);captureInterval=null;}
      if(liveMode==="sfu"){
        if(sfuHandle){try{sfuHandle.producer&&sfuHandle.producer.close();}catch(e){}try{sfuHandle.transport&&sfuHandle.transport.close();}catch(e){}sfuHandle=null;}
        if(sfuSession){S.socket.emit("live:close",{sessionId:sfuSession});api("/live/stop",{method:"POST",body:JSON.stringify({sessionId:sfuSession})}).catch(()=>{});sfuSession=null;}
      }else{
        S.socket.emit("live_stop");
      }
      if(localStream){localStream.getTracks().forEach(tr=>tr.stop());localStream=null;}
    }else{
      if(liveMode==="sfu"){
        if(sfuViewHandle){try{sfuViewHandle.transport&&sfuViewHandle.transport.close();}catch(e){}sfuViewHandle=null;}
        if(sfuSession)S.socket.emit("live:leave",{sessionId:sfuSession});
      }else{
        S.socket.emit("live_leave");
      }
    }
    S.socket.off("live_status");S.socket.off("live_frame");S.socket.off("live_ended");S.socket.off("live:available");S.socket.off("live:ended");S.socket.off("live:viewers");S.socket.off("live:new-producer");
    ov.remove();
  };
}

function openAdmin(){modal("Admin Dashboard",async(body,close)=>{body.innerHTML=`<div style="text-align:center;color:${t.t3};animation:pu 1.5s infinite">Loading...</div>`;try{const[stats,ud]=await Promise.all([api("/admin/stats"),api("/admin/users")]);body.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:16px">${[["totalUsers","Users","👥"],["activeUsers","Pro","⭐"],["freeUsers","Free","🆓"],["blockedUsers","Blocked","🚫"],["totalChats","Chats","💬"],["totalMessages","Msgs","📨"],["groups","Groups","👥"],["channels","Channels","📢"],["newToday","New Today","📊"],["msgsToday","Msgs Today","📈"]].map(([k,l,ic])=>`<div style="padding:10px;border-radius:10px;background:${t.cd};border:1px solid ${t.bd};text-align:center"><div style="font-size:20px;font-weight:800;background:${t.pg};-webkit-background-clip:text;-webkit-text-fill-color:transparent">${stats[k]||0}</div><div style="font-size:10px;color:${t.t3};margin-top:1px">${ic} ${l}</div></div>`).join("")}</div><div style="margin-bottom:10px"><input id="ad-sq" class="gi" placeholder="🔍 Search by name, email, @username..." style="font-size:14px"/></div><div id="ad-ul" style="max-height:300px;overflow-y:auto;-webkit-overflow-scrolling:touch"></div>`;const renderUsers=(users)=>{const ul=body.querySelector("#ad-ul");ul.innerHTML="";if(!users.length){ul.innerHTML=`<div style="padding:20px;text-align:center;color:${t.t3};font-size:13px">No users found</div>`;return;}users.forEach(u=>{const d=ce("div");d.style.cssText=`display:flex;align-items:center;gap:8px;padding:8px;border-radius:10px;margin-bottom:3px;background:${t.cd};border:1px solid ${t.bd}`;d.innerHTML=`${avatar(u.avatar||"💬",30)}<div style="flex:1;min-width:0"><div style="color:${t.t1};font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(u.name||u.email)} ${u.username?`<span style="color:${t.t3}">@${esc(u.username)}</span>`:""} ${u.role==="admin"?'<span style="color:#f59e0b;font-size:10px">admin</span>':""}${u.subscription_status==="active"?' <span style="color:#FFD700;font-weight:800;font-size:10px">PRO</span>':""}</div><div style="font-size:10px;color:${t.t3}">${u.subscription_status}${u.blocked?" · 🚫":""}</div></div>`;if(u.id!==S.user.id){const acts=ce("div");acts.style.cssText="display:flex;gap:2px;flex-shrink:0";const mkB=(l,c,fn)=>{const b=ce("button");b.type="button";b.textContent=l;b.style.cssText=`padding:3px 7px;border-radius:6px;border:1px solid ${t.bd};background:transparent;color:${c};font-size:10px;cursor:pointer;font-family:'Outfit',sans-serif`;b.onclick=fn;return b;};acts.appendChild(mkB(u.blocked?"Unblk":"Block",u.blocked?"#4ade80":"#ff6b6b",async()=>{await api(`/admin/users/${u.id}/${u.blocked?"unblock":"block"}`,{method:"POST"});close();openAdmin();}));acts.appendChild(mkB("+30d",t.ac,async()=>{await api(`/admin/users/${u.id}/subscription`,{method:"POST",body:JSON.stringify({status:"active",days:30})});close();openAdmin();}));acts.appendChild(mkB("Del","#ef4444",async()=>{if(confirm("Delete?")){await api(`/admin/users/${u.id}`,{method:"DELETE"});close();openAdmin();}}));d.appendChild(acts);}ul.appendChild(d);});};renderUsers(ud.users);let st;body.querySelector("#ad-sq").oninput=()=>{clearTimeout(st);st=setTimeout(async()=>{const q=body.querySelector("#ad-sq").value.trim();try{const d=await api("/admin/users?q="+encodeURIComponent(q));renderUsers(d.users);}catch{}},400);};}catch(e){body.innerHTML=`<div style="color:#ef4444">${esc(e.error||"Error")}</div>`;}});}

// ━━━ SOCKET ━━━
function connectSocket(){
  if(S.socket)S.socket.disconnect();if(!S.token)return;
  S.socket=io({auth:{token:S.token}});
  S.socket.on("online_users",u=>{S.onlineUsers=u;renderChatListItems();});
  S.socket.on("chat_message",msg=>{
    const ch=S.chats.find(c=>c.id===msg.chat_id);
    if(ch){ch.lastMessage=msg;if(msg.chat_id!==S.activeChat||document.hidden)ch.unread=(ch.unread||0)+1;S.chats=S.chats.filter(c=>c.id!==msg.chat_id);S.chats.unshift(ch);renderChatListItems();}else loadChats();
    if(msg.chat_id===S.activeChat){S.chatMsgs.push(msg);const mc=$("#cv-msgs");if(mc){mc.insertAdjacentHTML("beforeend",msgBubble(msg));scrollB(mc);const newEl=mc.querySelector(`[data-mid="${msg.id}"]`);if(newEl){let timer;newEl.oncontextmenu=e=>{e.preventDefault();showMsgMenu(msg.id);};newEl.ontouchstart=()=>{timer=setTimeout(()=>showMsgMenu(msg.id),500);};newEl.ontouchmove=()=>clearTimeout(timer);newEl.ontouchend=()=>clearTimeout(timer);}}api(`/chats/${msg.chat_id}/read`,{method:"POST"}).catch(()=>{});if(ch)ch.unread=0;renderChatListItems();}
    if(msg.user_id!==S.user.id)playNotif();
  });
  S.socket.on("message_edited",msg=>{const idx=S.chatMsgs.findIndex(m=>m.id===msg.id);if(idx>=0){S.chatMsgs[idx]=msg;const mc=$("#cv-msgs");if(mc){mc.innerHTML=S.chatMsgs.map(m=>msgBubble(m)).join("");scrollB(mc);bindMsgEvents(mc);}}const pi=(S.pinnedMsgs||[]).findIndex(p=>p.id===msg.id);if(pi>=0){S.pinnedMsgs[pi]={...S.pinnedMsgs[pi],content:msg.content,image:msg.image};updatePinBar();}});
  S.socket.on("message_deleted",({id,chat_id})=>{S.chatMsgs=S.chatMsgs.filter(m=>m.id!==id);if(chat_id===S.activeChat){const mc=$("#cv-msgs");if(mc){const el=mc.querySelector(`[data-mid="${id}"]`);if(el)el.remove();}if((S.pinnedMsgs||[]).some(p=>p.id===id)){S.pinnedMsgs=S.pinnedMsgs.filter(p=>p.id!==id);if(S.pinIndex>=S.pinnedMsgs.length)S.pinIndex=0;updatePinBar();}}});
  S.socket.on("message_pinned",msg=>{
    if(msg.chat_id!==S.activeChat)return;
    const i=S.chatMsgs.findIndex(m=>m.id===msg.id);if(i>=0)S.chatMsgs[i].pinned=true;
    S.pinnedMsgs=[msg,...(S.pinnedMsgs||[]).filter(p=>p.id!==msg.id)];S.pinIndex=0;updatePinBar();
  });
  S.socket.on("message_unpinned",({id,chat_id})=>{
    if(chat_id!==S.activeChat)return;
    const i=S.chatMsgs.findIndex(m=>m.id===id);if(i>=0)S.chatMsgs[i].pinned=false;
    S.pinnedMsgs=(S.pinnedMsgs||[]).filter(p=>p.id!==id);if(S.pinIndex>=S.pinnedMsgs.length)S.pinIndex=0;updatePinBar();
  });
  S.socket.on("typing",data=>{if(data.chatId===S.activeChat){const el=$("#cv-sub");if(el){el.textContent="typing...";clearTimeout(el._t);el._t=setTimeout(()=>{el.textContent=S.chatInfo?.type==="dm"?"":`${S.chatInfo?.member_count||S.chatInfo?.members?.length||""} members`;},2000);}}});
}

// Resize: ONLY rebuild on WIDTH change. Keyboard open/close only changes HEIGHT.
// This prevents the destroy loop: keyboard→resize→renderApp→DOM nuke→keyboard close
let _resizeT;
window.addEventListener("resize",()=>{
  const newW=window.innerWidth;
  if(newW!==_lastW){_lastW=newW;setVH();clearTimeout(_resizeT);_resizeT=setTimeout(()=>{if(S.token&&S.user)renderApp();},300);}});

// ━━━ INIT ━━━
(async()=>{applyCSS();setVH();
  $("#app").innerHTML=`<div style="width:100vw;height:calc(var(--vh,1vh)*100);display:flex;align-items:center;justify-content:center;background:#030812"><div style="text-align:center;animation:pu 1.5s ease infinite"><div style="font-size:44px;margin-bottom:14px">📈</div><div style="color:#607090;font-size:14px;font-family:'Outfit',sans-serif">Loading...</div></div></div>`;
  if(S.token){try{const u=await api("/auth/me");S.user=u;localStorage.setItem("dq_u",JSON.stringify(u));}catch{S.token=null;S.user=null;localStorage.removeItem("dq_t");localStorage.removeItem("dq_u");}}
  render();if(S.token)connectSocket();
})();
</script></body></html>
